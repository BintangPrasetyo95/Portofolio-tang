        // WALL WITH TEXT HOLE
        function createWallWithTextHole(word, size, thickness) {
            const rawShapes = font.generateShapes(word, size, 10);

            const textGeometry = new THREE.ShapeGeometry(rawShapes);
            const textBounds = new THREE.Box3().setFromObject(new THREE.Mesh(textGeometry));
            const textWidth = textBounds.max.x - textBounds.min.x;
            const textHeight = textBounds.max.y - textBounds.min.y;
            const textCenterX = (textBounds.min.x + textBounds.max.x) / 2;

            const margin = 20;
            const wallWidth = Math.max(textWidth + margin, 6);
            const wallHeight = Math.max(textHeight + margin, 3.5);
            const bottomPadding = 0.35;

            const minX = textCenterX - wallWidth / 2;
            const maxX = textCenterX + wallWidth / 2;
            const minY = textBounds.min.y - bottomPadding;
            const maxY = minY + wallHeight;

            const wallShape = new THREE.Shape();
            wallShape.moveTo(minX, minY);
            wallShape.lineTo(maxX, minY);
            wallShape.lineTo(maxX, maxY);
            wallShape.lineTo(minX, maxY);
            wallShape.lineTo(minX, minY);
            wallShape.holes.push(...rawShapes);

            const backShape = new THREE.Shape();
            backShape.moveTo(minX, minY);
            backShape.lineTo(maxX, minY);
            backShape.lineTo(maxX, maxY);
            backShape.lineTo(minX, maxY);
            backShape.lineTo(minX, minY);

            const halfThickness = thickness / 2;

            const frontExtrudeSettings = {
                depth: halfThickness,
                bevelEnabled: false,
                curveSegments: 12,
                steps: 1,
            };

            const backExtrudeSettings = {
                depth: halfThickness,
                bevelEnabled: false,
                curveSegments: 12,
                steps: 1,
            };

            const frontGeometry = new THREE.ExtrudeGeometry(wallShape, frontExtrudeSettings);
            frontGeometry.computeBoundingBox();
            const frontCenterX = (frontGeometry.boundingBox.min.x + frontGeometry.boundingBox.max.x) / 2;
            const frontBottomY = frontGeometry.boundingBox.min.y;
            frontGeometry.translate(-frontCenterX, -frontBottomY, 0);

            const backGeometry = new THREE.ExtrudeGeometry(backShape, backExtrudeSettings);
            backGeometry.computeBoundingBox();
            const backCenterX = (backGeometry.boundingBox.min.x + backGeometry.boundingBox.max.x) / 2;
            const backBottomY = backGeometry.boundingBox.min.y;
            backGeometry.translate(-backCenterX, -backBottomY, -halfThickness);

            const textCenterY = (textBounds.min.y + textBounds.max.y) / 2;
            const textTargetY = textCenterY - minY;

            return { frontGeometry, backGeometry, wallHeight, textTargetY, textWidth, bottomPadding };
        }

        function buildMesh(word, angleDeg, depthVal, textSize) {
            while (currentGroup.children.length) {
                const child = currentGroup.children[0];
                if (child.geometry) child.geometry.dispose();
                if (child.material) {
                    [].concat(child.material).forEach(mat => { mat.map && mat.map.dispose(); mat.dispose(); });
                }
                currentGroup.remove(child);
            }

            if (!font) return;

            const wallDepth = Math.max(depthVal * 0.03, 0.4);
            const { frontGeometry, backGeometry, wallHeight, textTargetY, textWidth, bottomPadding } = createWallWithTextHole(word || 'BINTANG', textSize, wallDepth);

            const wallMaterial = new THREE.MeshStandardMaterial({
                color: 0x000000,
                roughness: 0.58,
                metalness: 0.06,
                side: THREE.DoubleSide,
            });

            const backMaterial = new THREE.MeshBasicMaterial({
                color: 0xfcb32d,
                side: THREE.FrontSide,
                transparent: isLoading,
                opacity: isLoading ? 0.0 : 1.0
            });

            const frontMesh = new THREE.Mesh(frontGeometry, wallMaterial);
            frontMesh.castShadow = true;
            frontMesh.receiveShadow = true;

            const backMesh = new THREE.Mesh(backGeometry, backMaterial);
            mainBackMesh = backMesh;

            const meshY = floorMesh.position.y - bottomPadding - 0.0425;
            frontMesh.position.set(0, meshY, 0);
            backMesh.position.set(0, meshY, -0.002);

            currentGroup.add(frontMesh);
            currentGroup.add(backMesh);

            const projectionDistance = Math.max(textWidth * 0.9 + 2.0, 4.0);
            const projectionLight = new THREE.SpotLight(0xfcb32d, isLoading ? 0.0 : 100.0, 25, Math.PI / 3, 0.4, 1.0);
            orangeProjectionLight = projectionLight;

            const lightY = meshY + textTargetY;
            projectionLight.position.set(0, lightY, -projectionDistance);
            projectionLight.castShadow = true;

            projectionLight.shadow.mapSize.width = 2048;
            projectionLight.shadow.mapSize.height = 2048;
            projectionLight.shadow.camera.near = 1.0;
            projectionLight.shadow.camera.far = 30;
            projectionLight.shadow.bias = -0.0005;

            const lightTarget = new THREE.Object3D();
            lightTarget.position.set(0, lightY, 10.0);
            currentGroup.add(lightTarget);
            projectionLight.target = lightTarget;

            currentGroup.add(projectionLight);

            currentGroup.rotation.y = THREE.MathUtils.degToRad(angleDeg);
        }

        let word = 'BINTANG';
        let angleDeg = -48;
        let depthVal = 32;
        let textSize = 6.0;

        // SCROLL STATE
        let scrollProgress = 0;
        let bubblePhase1Progress = 0; // current smoothed progress (lerped)
        let bubblePhase2Progress = 0; // current smoothed progress (lerped)
        let targetPhase1Progress = 0; // target based on scroll position
        let targetPhase2Progress = 0; // target based on scroll position
        let loadingDone = false;      // true once loading+transition completes
        let bubbleStickyProgress = 0; // current smoothed progress of section 2 sticky phase (lerped)
        let targetStickyProgress = 0; // target based on scroll position

        const heroBg = document.getElementById('heroBg');
        const heroOverlay = document.getElementById('heroOverlay');
        const heroTitle = document.getElementById('heroTitle');
        const cornerLabel = document.getElementById('cornerLabel');
        const scrollIndicator = document.getElementById('scrollIndicator');
        const line1Span = document.querySelector('#heroTitle .line:nth-child(1) span');
        const line2Span = document.querySelector('#heroTitle .line:nth-child(2) span');

        const helloBubble = document.getElementById('helloBubble');
        if (helloBubble) {
            const greetings = [
                "Hello!",
                "I'm here!",
                "Hi there!",
                "Hey!",
                "Interested?",
                "Yo!",
                "Sup!",
                "It's me!"
            ];
            helloBubble.textContent = greetings[Math.floor(Math.random() * greetings.length)];
            // helloBubble.textContent = greetings[4];
        }

        let titleAnimated = false;

        let stickyRange = 0.8;
        let phase2Range = 0.5;

        function updateScrollThresholds() {
            const isMobile = window.innerWidth < 576;
            const wrap = document.getElementById('section-2-wrap');
            if (isMobile) {
                stickyRange = 0.45;
                phase2Range = 0.35;
                if (wrap) wrap.style.height = '145vh';
            } else {
                stickyRange = 0.8;
                phase2Range = 0.5;
                if (wrap) wrap.style.height = '180vh';
            }
        }
        updateScrollThresholds();

        function onScroll() {
            if (!loadingDone) return;
            const scrollY = window.scrollY;
            const viewHeight = window.innerHeight;
            
            // Camera transitions from Section 1 to Section 2
            scrollProgress = viewHeight > 0 ? Math.min(scrollY / viewHeight, 1) : 0;
            
            // Phase 1 target: starts at 0.3 * viewHeight, completes at viewHeight
            const phase1Start = 0.3 * viewHeight;
            if (scrollY < phase1Start) {
                targetPhase1Progress = 0;
            } else if (scrollY < viewHeight) {
                targetPhase1Progress = (scrollY - phase1Start) / (viewHeight - phase1Start);
            } else {
                targetPhase1Progress = 1;
            }

            const stickyEnd = (1.0 + stickyRange) * viewHeight;

            // Phase 2 target: starts after sticky unpins and completes at phase2Range scroll distance
            if (scrollY < stickyEnd) {
                targetPhase2Progress = 0;
            } else {
                targetPhase2Progress = viewHeight > 0 ? Math.min((scrollY - stickyEnd) / (phase2Range * viewHeight), 1) : 0;
            }

            // Sticky Section 2 progress (goes 0 to 1 as Section 2 remains sticky on screen)
            if (scrollY < viewHeight) {
                targetStickyProgress = 0;
            } else if (scrollY < stickyEnd) {
                targetStickyProgress = viewHeight > 0 ? (scrollY - viewHeight) / (stickyRange * viewHeight) : 0;
            } else {
                targetStickyProgress = 1;
            }

            // Social header transitions (Top center sliding header)
            const socialHeader = document.querySelector('.social-header');
            if (socialHeader) {
                // Slides down from the top and becomes visible once Section 2 ends
                if (scrollY >= stickyEnd - 20) {
                    socialHeader.classList.add('visible');
                } else {
                    socialHeader.classList.remove('visible');
                }
            }

            // Section 3-4 Horizontal Sticky Slide
            const wrap34 = document.getElementById('section-3-4-wrap');
            if (wrap34) {
                const wrapTop = wrap34.offsetTop;
                const wrapHeight = wrap34.offsetHeight;
                const scrollRange = wrapHeight - viewHeight;
                let horizontalProgress = 0;
                
                if (scrollY > wrapTop) {
                    horizontalProgress = Math.min((scrollY - wrapTop) / scrollRange, 1.0);
                }
                
                const strip = document.getElementById('horizontal-strip');
                if (strip) {
                    strip.style.transform = `translateX(${-horizontalProgress * 100}vw)`;
                }

                const bCanvas = document.getElementById('bubbleCanvas');
                if (bCanvas) {
                    bCanvas.style.transform = `translateX(${-horizontalProgress * 100}vw)`;
                }
            }
        }
        window.addEventListener('scroll', onScroll, { passive: true });
        lenis.on('scroll', onScroll);

        // RESIZE
        window.addEventListener('resize', () => {
            camera.aspect = innerWidth / innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(innerWidth, innerHeight);
            bubbleCamera.aspect = innerWidth / innerHeight;
            bubbleCamera.updateProjectionMatrix();
            bubbleRenderer.setSize(innerWidth, innerHeight);
            updateResponsiveCamera();
            updateScrollThresholds();
        });

        // ANIMATION LOOP
        (function animate(time) {
            requestAnimationFrame(animate);
            lenis.raf(time);

            const now = performance.now() / 1000;

            // Flicker state
            const total = now % lightFlicker.period;
            let on = false;
            let blinkIndex = 0;
            for (let i = 0; i < lightFlicker.pattern.length; i++) {
                if (total <= lightFlicker.pattern[i].end) {
                    on = lightFlicker.pattern[i].on;
                    blinkIndex = i;
                    break;
                }
            }
            if (total > lightFlicker.pattern[lightFlicker.pattern.length - 1].end) {
                blinkIndex = lightFlicker.pattern.length - 1;
                on = lightFlicker.pattern[blinkIndex].on;
            }

            // ── LOADING PHASE ──
            if (isLoading) {
                if (font) {
                    if (loadingStartTime === null) {
                        loadingStartTime = now;
                    }

                    const elapsed = now - loadingStartTime;
                    const lastCharIdx = loadingWord.length - 1;
                    const dropEndTime = lastCharIdx * dropDelay + dropDuration;

                    // Animate dropping letters
                    for (let i = 0; i < targetMeshes.length; i++) {
                        const startDropTime = i * dropDelay;
                        if (elapsed >= startDropTime) {
                            targetMeshes[i].visible = true;
                            const p = Math.min((elapsed - startDropTime) / dropDuration, 1.0);
                            const eased = easeOutCubic(p);
                            const Y_start = 1.5;
                            targetMeshes[i].position.y = Y_start * (1.0 - eased);
                        }
                    }

                    // Glow effect for box outline
                    if (elapsed >= dropEndTime) {
                        const glowProgress = Math.min((elapsed - dropEndTime) / 0.4, 1.0);
                        boxOutlineMaterial.color.lerpColors(new THREE.Color(0x333333), new THREE.Color(0xfcb32d), glowProgress);
                    }

                    // Hold & fade
                    if (elapsed >= dropEndTime + holdDuration) {
                        endLoadingScreen();
                    }

                    if (transitionTriggered) {
                        const fadeElapsed = now - transitionStartTime;
                        const fadeProgress = Math.min(fadeElapsed / transitionDuration, 1.0);

                        // Fade out loading elements
                        baselineMaterial.opacity = 0.4 * (1.0 - fadeProgress);
                        targetMaterial.opacity = 1.0 * (1.0 - fadeProgress);
                        panelMaterial.opacity = 0.8 * (1.0 - fadeProgress);
                        boxOutlineMaterial.opacity = 0.8 * (1.0 - fadeProgress);
                        if (loadingLight) {
                            loadingLight.intensity = 5.0 * (1.0 - fadeProgress);
                        }

                        // Camera swoop
                        const t = easeInOutCubic(fadeProgress);
                        camera.position.set(0.4, THREE.MathUtils.lerp(10.0, MAIN_CAM.y, t), MAIN_CAM.z);
                        camera.lookAt(MAIN_LOOK.x, MAIN_LOOK.y, MAIN_LOOK.z);

                        // Build main mesh
                        if (!mainMeshBuilt) {
                            buildMesh(word, angleDeg, depthVal, textSize);
                            mainMeshBuilt = true;
                        }

                        if (mainBackMesh) {
                            mainBackMesh.material.opacity = fadeProgress;
                        }

                        // Scale light intensities
                        headLight.intensity = fadeProgress * (on ? lightFlicker.onIntensity : lightFlicker.offIntensity);
                        fillLight.intensity = fadeProgress * (on ? 0.24 : 0.0);
                        if (orangeProjectionLight) {
                            orangeProjectionLight.intensity = fadeProgress * 100.0;
                        }

                        // Done loading
                        if (fadeProgress >= 1.0) {
                            isLoading = false;
                            loadingDone = true;
                            onScroll();
                            scene.remove(loadingGroup);

                            loadingGroup.traverse(child => {
                                if (child.geometry) child.geometry.dispose();
                                if (child.material) {
                                    [].concat(child.material).forEach(mat => mat.dispose());
                                }
                            });

                            headLight.intensity = on ? lightFlicker.onIntensity : lightFlicker.offIntensity;
                            fillLight.intensity = on ? 0.24 : 0.0;
                            if (orangeProjectionLight) {
                                orangeProjectionLight.intensity = 100.0;
                            }

                            // Enable scrolling now
                            document.body.classList.add('scrollable');
                            scrollIndicator.classList.add('show');
                            lenis.start();
                        }
                    } else {
                        camera.position.set(0.4, 10, MAIN_CAM.z);
                        camera.lookAt(0, 1, 0);
                        headLight.intensity = 0;
                        fillLight.intensity = 0;
                    }
                }
            }
            // ── MAIN SCENE (post-loading) ──
            else {
                // Flicker
                headLight.intensity = on ? lightFlicker.onIntensity : lightFlicker.offIntensity;
                fillLight.intensity = on ? 0.24 : 0.0;

                const orangeColor = on ? orangeOnColor : orangeOffColor;
                if (orangeProjectionLight) {
                    orangeProjectionLight.intensity = 100.0;
                    orangeProjectionLight.color.setHex(orangeColor);
                }

                // ── SCROLL-DRIVEN CAMERA ──
                // scrollProgress 0 → 1 maps camera from MAIN to SCROLL
                const sp = easeInOutCubic(scrollProgress);

                const camY = THREE.MathUtils.lerp(MAIN_CAM.y, SCROLL_CAM.y, sp);
                const camX = THREE.MathUtils.lerp(MAIN_CAM.x, SCROLL_CAM.x, sp);
                const camZ = THREE.MathUtils.lerp(MAIN_CAM.z, SCROLL_CAM.z, sp);

                camera.position.set(camX, camY, camZ);

                const lookY = THREE.MathUtils.lerp(MAIN_LOOK.y, SCROLL_LOOK.y, sp);
                camera.lookAt(MAIN_LOOK.x, lookY, MAIN_LOOK.z);

                // ── REVEAL LAYERS ──
                // Trigger reveal image zoom when scrolling down to Section 2
                const section2 = document.getElementById('section-2');
                if (scrollProgress > 0.4) {
                    heroBg.classList.add('revealed');
                    section2.classList.add('revealed');
                    if (!titleAnimated) {
                        titleAnimated = true;
                        heroTitle.classList.add('animate');
                        cornerLabel.classList.add('visible');
                    }
                } else {
                    heroBg.classList.remove('revealed');
                    section2.classList.remove('revealed');
                    if (titleAnimated) {
                        titleAnimated = false;
                        heroTitle.classList.remove('animate');
                        cornerLabel.classList.remove('visible');
                    }
                }

                // Scroll-driven progressive Hello! bubble showing and fading
                let helloProgress = 0;
                if (bubbleStickyProgress < 0.3) {
                    // Fade in from 0.0 to 0.3 scroll progress
                    helloProgress = bubbleStickyProgress / 0.3;
                } else if (bubbleStickyProgress < 0.6) {
                    // Stay fully visible
                    helloProgress = 1.0;
                } else if (bubbleStickyProgress < 0.9) {
                    // Fade out from 0.6 to 0.9 scroll progress
                    helloProgress = 1.0 - ((bubbleStickyProgress - 0.6) / 0.3);
                } else {
                    helloProgress = 0.0;
                }

                const helloBubble = document.getElementById('helloBubble');
                if (helloBubble) {
                    helloBubble.style.opacity = helloProgress;
                    // Slightly slide up (translateY 15px to 0px) and scale up (0.9 to 1.0)
                    helloBubble.style.transform = `translateY(${(1.0 - helloProgress) * 15}px) scale(${0.9 + (helloProgress * 0.1)})`;
                }

                // Hide scroll indicator when scrolled
                if (scrollProgress > 0.05) {
                    scrollIndicator.classList.add('hidden');
                } else {
                    scrollIndicator.classList.remove('hidden');
                }
            }

            // update 3D bubbles (position + vertex wobble)
            try { updateBubbles(now); } catch (e) { /* fail safe */ }
            renderer.render(scene, camera);
            bubbleRenderer.render(bubbleScene, bubbleCamera);
        })();

    })();
    </script>


    <script>
    (function () {
        'use strict';

        const canvas = document.getElementById('wormCanvas');
        const ctx = canvas.getContext('2d');
        canvas.width = innerWidth;
        canvas.height = innerHeight;

        const WORM_COUNT = 22;
        const worms = [];

        class Worm {
            constructor() {
                this.segCount = 50 + Math.floor(Math.random() * 40);
                this.segments = [];

                // Start position
                let x = Math.random() * canvas.width;
                let y = Math.random() * canvas.height;

                for (let i = 0; i < this.segCount; i++) {
                    this.segments.push({ x, y });
                }

                // Movement params — sinusoidal oscillation
                this.headSpeed = 0.3 + Math.random() * 0.7;
                this.turnSpeed = 0.002 + Math.random() * 0.004;
                this.angle = Math.random() * Math.PI * 2;
                this.waveFreq1 = 0.02 + Math.random() * 0.03;
                this.waveAmp1 = 1.5 + Math.random() * 3;
                this.waveFreq2 = 0.008 + Math.random() * 0.015;
                this.waveAmp2 = 2 + Math.random() * 4;
                this.phase = Math.random() * Math.PI * 2;

                // Visual
                this.hue = 25 + Math.random() * 30; // warm golden
                this.saturation = 40 + Math.random() * 30;
                this.lightness = 45 + Math.random() * 20;
                this.alpha = 0.04 + Math.random() * 0.10;
                this.width = 1 + Math.random() * 2.5;
                this.segSpacing = 2 + Math.random() * 3;

                this.time = Math.random() * 1000;
            }

            update(dt) {
                this.time += dt;

                // Move head in organic curves
                this.angle += Math.sin(this.time * this.waveFreq1 + this.phase) * this.turnSpeed * 3;
                this.angle += Math.cos(this.time * this.waveFreq2 + this.phase * 0.7) * this.turnSpeed * 2;

                const head = this.segments[0];
                head.x += Math.cos(this.angle) * this.headSpeed;
                head.y += Math.sin(this.angle) * this.headSpeed;

                // Sinusoidal lateral offset for organic wriggle
                const lateralAngle = this.angle + Math.PI / 2;
                const wriggle = Math.sin(this.time * 0.08 + this.phase) * this.waveAmp1
                              + Math.sin(this.time * 0.035 + this.phase * 1.3) * this.waveAmp2 * 0.3;
                head.x += Math.cos(lateralAngle) * wriggle * 0.02;
                head.y += Math.sin(lateralAngle) * wriggle * 0.02;

                // Wrap around screen edges with margin
                const margin = 80;
                if (head.x < -margin) head.x = canvas.width + margin;
                if (head.x > canvas.width + margin) head.x = -margin;
                if (head.y < -margin) head.y = canvas.height + margin;
                if (head.y > canvas.height + margin) head.y = -margin;

                // Each segment follows the one ahead (smooth chain)
                for (let i = 1; i < this.segCount; i++) {
                    const prev = this.segments[i - 1];
                    const curr = this.segments[i];
                    const dx = prev.x - curr.x;
                    const dy = prev.y - curr.y;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    if (dist > this.segSpacing) {
                        const ratio = this.segSpacing / dist;
                        curr.x = prev.x - dx * ratio;
                        curr.y = prev.y - dy * ratio;
                    }
                }
            }

            draw(ctx) {
                if (this.segments.length < 3) return;

                ctx.beginPath();
                ctx.strokeStyle = `hsla(${this.hue}, ${this.saturation}%, ${this.lightness}%, ${this.alpha})`;
                ctx.lineWidth = this.width;
                ctx.lineCap = 'round';
                ctx.lineJoin = 'round';

                ctx.moveTo(this.segments[0].x, this.segments[0].y);

                // Smooth curve through segments
                for (let i = 1; i < this.segments.length - 1; i++) {
                    const curr = this.segments[i];
                    const next = this.segments[i + 1];
                    const midX = (curr.x + next.x) / 2;
                    const midY = (curr.y + next.y) / 2;
                    ctx.quadraticCurveTo(curr.x, curr.y, midX, midY);
                }

                const last = this.segments[this.segments.length - 1];
                ctx.lineTo(last.x, last.y);

                ctx.stroke();

                // Subtle glow at head
                const headGradient = ctx.createRadialGradient(
                    this.segments[0].x, this.segments[0].y, 0,
                    this.segments[0].x, this.segments[0].y, 8
                );
                headGradient.addColorStop(0, `hsla(${this.hue}, ${this.saturation}%, ${this.lightness + 10}%, ${this.alpha * 2})`);
                headGradient.addColorStop(1, `hsla(${this.hue}, ${this.saturation}%, ${this.lightness}%, 0)`);
                ctx.fillStyle = headGradient;
                ctx.beginPath();
                ctx.arc(this.segments[0].x, this.segments[0].y, 8, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        for (let i = 0; i < WORM_COUNT; i++) {
            worms.push(new Worm());
        }

        let lastTimestamp = 0;

        function animateWorms(timestamp) {
            requestAnimationFrame(animateWorms);

            const dt = timestamp - lastTimestamp;
            lastTimestamp = timestamp;

            ctx.clearRect(0, 0, canvas.width, canvas.height);

            for (const worm of worms) {
                worm.update(dt);
                worm.draw(ctx);
            }
        }

        requestAnimationFrame(animateWorms);

        window.addEventListener('resize', () => {
            canvas.width = innerWidth;
            canvas.height = innerHeight;
        });
    })();
    </script>

        // Setup static left and right pages (cream palette)

        // Slide navigation wrapper
        function goToProject(targetIndex, direction = null) {
            if (isTransitioning) return;
            isTransitioning = true;

            if (direction === null) {
                direction = targetIndex > currentIndex ? 'next' : 'prev';
            }

            const oldIndex = currentIndex;
            currentIndex = targetIndex;

            // Update pagination dots
            const dots = pagination.querySelectorAll('.dot');
            dots.forEach((dot, idx) => {
                dot.classList.toggle('active', idx === currentIndex);
            });

            const prevProj = projects[oldIndex];
            const newProj = projects[currentIndex];

            // Setup the static pages behind the turning page IMMEDIATELY
            // If turning NEXT: Left static page remains oldIndex's blueprint, Right static page changes to newIndex's metrics sheet
            // If turning PREV: Left static page changes to newIndex's blueprint, Right static page remains oldIndex's metrics sheet
            const staticLeftProj = direction === 'next' ? prevProj : newProj;
            const staticRightProj = direction === 'next' ? newProj : prevProj;

            bookPages.innerHTML = `
                <!-- Left static page -->
                <div class="page-sheet-3d left-static">
                    <div class="page-crease" style="left:auto;right:0;background:linear-gradient(to left,rgba(120,100,60,0.15),rgba(120,100,60,0.04) 50%,transparent 100%);"></div>
                    ${staticLeftProj.blueprint}
                    <div class="page-inner-content">
                        <div class="page-header">
                            <span>BLUEPRINT ARCHITECTURE</span>
                            <span>SYS.REV 0.4</span>
                        </div>
                        <div class="page-body-blueprint"></div>
                        <div class="page-footer">
                            <span>PAGE ${(direction === 'next' ? oldIndex : currentIndex) * 2 + 1}</span>
                        </div>
                    </div>
                </div>
                
                <!-- Right static page -->
                <div class="page-sheet-3d right-static">
                    <div class="page-crease"></div>
                    <div class="page-inner-content">
                        <div class="page-header">
                            <span>TECHNICAL METRICS</span>
                            <span>SPEC SHEET</span>
                        </div>
                        <div style="flex-grow: 1; display: flex; flex-direction: column; justify-content: center; gap: 10px; font-family: monospace; font-size: 10px; color: #8b6914; padding: 10px 0;">
                            <div style="color:#5a4520;">// CONFIG SPECIFICATIONS</div>
                            ${staticRightProj.specs.map(spec => `<div>&gt; ${spec}</div>`).join('')}
                        </div>
                        <div class="page-footer">
                            <span>PAGE ${(direction === 'next' ? currentIndex : oldIndex) * 2 + 2}</span>
                        </div>
                    </div>
                </div>
            `;

            // Build a flipping page element with front/back content
            const flipPage = document.createElement('div');
            flipPage.className = 'page-sheet-3d flipping-page';
            flipPage.style.position = 'absolute';
            flipPage.style.top = '8px';
            flipPage.style.height = 'calc(100% - 16px)';
            flipPage.style.zIndex = 40;

            const pageClipPath = `polygon(
                0% 2%, 2% 0%, 98% 0%, 100% 2%, 
                100% 95%, 99% 96%, 98% 95%, 97% 98%, 95% 97%, 
                93% 100%, 7% 100%, 5% 98%, 3% 97%, 1% 99%, 0% 98%
            )`;

            const pageBg = `radial-gradient(circle at 20% 30%, rgba(139, 105, 20, 0.05) 0%, transparent 60%),
                            radial-gradient(circle at 80% 70%, rgba(90, 69, 32, 0.08) 0%, transparent 60%),
                            linear-gradient(135deg, #f2e5c4 0%, #eddcae 35%, #e3ce94 75%, #d1ba7b 100%)`;

            if (direction === 'next') {
                flipPage.style.left = '50%';
                flipPage.style.transformOrigin = 'left center';
                flipPage.innerHTML = `
                    <div class="flip-front" style="position:absolute;inset:0;backface-visibility:hidden;-webkit-backface-visibility:hidden;padding:20px;overflow:hidden;border-radius:0 8px 8px 0;background:${pageBg};border:1px solid rgba(139, 105, 20, 0.45);color:#8b6914;clip-path:${pageClipPath};box-shadow:inset 0 0 50px rgba(90, 69, 32, 0.22);">
                        <div class="page-header"><span>TECHNICAL METRICS</span><span>SPEC SHEET</span></div>
                        <div style="flex-grow:1;display:flex;flex-direction:column;justify-content:center;gap:10px;font-family:monospace;font-size:10px;color:#5a4520;">
                             <div>// FLIPPING PROCESS</div>
                             <div>&gt; SAVING RUNSTATE...</div>
                             <div>&gt; LOADING NEXT METRICS...</div>
                        </div>
                        <div class="page-footer"><span>PAGE ${oldIndex * 2 + 2}</span></div>
                    </div>
                    <div class="flip-back" style="position:absolute;inset:0;backface-visibility:hidden;-webkit-backface-visibility:hidden;transform:rotateY(180deg);padding:20px;overflow:hidden;border-radius:8px 0 0 8px;background:${pageBg};border:1px solid rgba(139, 105, 20, 0.45);color:#8b6914;clip-path:${pageClipPath};box-shadow:inset 0 0 50px rgba(90, 69, 32, 0.22);">
                        ${newProj.blueprint}
                        <div style="display:flex;flex-direction:column;justify-content:space-between;height:100%;position:relative;z-index:2;">
                            <div class="page-header"><span>BLUEPRINT ARCHITECTURE</span><span>SYS.REV 0.4</span></div>
                            <div class="page-body-blueprint"></div>
                            <div class="page-footer"><span>PAGE ${currentIndex * 2 + 1}</span></div>
                        </div>
                    </div>
                `;
            } else {
                flipPage.style.right = '50%';
                flipPage.style.left = 'auto';
                flipPage.style.transformOrigin = 'right center';
                flipPage.innerHTML = `
                    <div class="flip-front" style="position:absolute;inset:0;backface-visibility:hidden;-webkit-backface-visibility:hidden;padding:20px;overflow:hidden;border-radius:8px 0 0 8px;background:${pageBg};border:1px solid rgba(139, 105, 20, 0.45);color:#8b6914;clip-path:${pageClipPath};box-shadow:inset 0 0 50px rgba(90, 69, 32, 0.22);">
                        ${prevProj.blueprint}
                        <div style="display:flex;flex-direction:column;justify-content:space-between;height:100%;position:relative;z-index:2;">
                            <div class="page-header"><span>BLUEPRINT ARCHITECTURE</span><span>SYS.REV 0.4</span></div>
                            <div class="page-body-blueprint"></div>
                            <div class="page-footer"><span>PAGE ${oldIndex * 2 + 1}</span></div>
                        </div>
                    </div>
                    <div class="flip-back" style="position:absolute;inset:0;backface-visibility:hidden;-webkit-backface-visibility:hidden;transform:rotateY(-180deg);padding:20px;overflow:hidden;border-radius:0 8px 8px 0;background:${pageBg};border:1px solid rgba(139, 105, 20, 0.45);color:#8b6914;clip-path:${pageClipPath};box-shadow:inset 0 0 50px rgba(90, 69, 32, 0.22);">
                        <div style="display:flex;flex-direction:column;justify-content:space-between;height:100%;">
                            <div class="page-header"><span>TECHNICAL METRICS</span><span>SPEC SHEET</span></div>
                            <div style="flex-grow:1;display:flex;flex-direction:column;justify-content:center;gap:10px;font-family:monospace;font-size:10px;color:#5a4520;">
                                <div>// FLIPPING PROCESS</div>
                                <div>&gt; DECRYPTING CORE...</div>
                                <div>&gt; RENDERING SCHEMATIC...</div>
                            </div>
                            <div class="page-footer"><span>PAGE ${currentIndex * 2 + 2}</span></div>
                        </div>
                    </div>
                `;
            }

            // Append and trigger animation
            bookPages.appendChild(flipPage);
            // Ensure initial state
            flipPage.style.transform = 'rotateY(0deg)';
            // Force reflow before starting transition
            // eslint-disable-next-line no-unused-expressions
            flipPage.offsetHeight;

            // Slightly tilt book for animation
            if (direction === 'next') {
                book3d.style.transform = 'rotateX(52deg) rotateY(-8deg) rotateZ(-2deg) translateY(60px)';
                // start flip to -180deg
                requestAnimationFrame(() => {
                    flipPage.style.transition = 'transform 1.25s cubic-bezier(0.35, 0, 0.25, 1)';
                    flipPage.style.transform = 'rotateY(-180deg)';
                });
            } else {
                book3d.style.transform = 'rotateX(52deg) rotateY(8deg) rotateZ(2deg) translateY(60px)';
                requestAnimationFrame(() => {
                    flipPage.style.transition = 'transform 1.25s cubic-bezier(0.35, 0, 0.25, 1)';
                    flipPage.style.transform = 'rotateY(180deg)';
                });
            }

            // Update cards visibility — trigger directional exit on the leaving card
            const cards = showcase.querySelectorAll('.floating-project');
            const exitingCard = showcase.querySelector('.floating-project.active');
            if (exitingCard) {
                exitingCard.style.transform = ''; // clear tilt-loop inline style so CSS animation runs
                exitingCard.classList.add(`exiting-${direction}`);
                setTimeout(() => exitingCard.classList.remove(`exiting-${direction}`), 700);
            }
            cards.forEach(c => c.classList.remove('active', 'from-left', 'from-right'));
            const activateCard = () => {
                const card = showcase.querySelector(`.floating-project[data-index="${currentIndex}"]`);
                if (card) {
                    card.style.transform = ''; // clear any stale inline style
                    // next → card rises from right page; prev → from left page
                    const enterClass = direction === 'next' ? 'from-right' : 'from-left';
                    card.classList.add('active', enterClass);
                    cardEnteringUntil = Date.now() + 1150; // block tilt loop during entry animation
                }
            };

            // Cleanup after transition
            const onTransitionEnd = (e) => {
                if (e.propertyName !== 'transform') return;
                flipPage.removeEventListener('transitionend', onTransitionEnd);
                // remove flipping element
                if (flipPage.parentNode) flipPage.parentNode.removeChild(flipPage);
                // restore book pose and resync parallax state
                book3d.style.transform = 'rotateX(54deg) rotateY(0deg) rotateZ(0deg) translateY(60px)';
                bookTiltCurrent = { x: 54, y: 0, z: 0 };
                bookTiltTarget  = { x: 54, y: 0, z: 0 };
                cardTiltCurrent = { x: 0, y: 0 };
                cardTiltTarget  = { x: 0, y: 0 };
                updateBookPages();
                activateCard();
                isTransitioning = false;
            };

            flipPage.addEventListener('transitionend', onTransitionEnd);

            // Safety timeout in case transitionend doesn't fire
            setTimeout(() => {
                if (isTransitioning) {
                    try { onTransitionEnd({ propertyName: 'transform' }); } catch (e) { isTransitioning = false; }
                }
            }, 1400);
        }

        prevBtn.addEventListener('click', () => {
            if (isTransitioning) return;
            let targetIdx = currentIndex - 1;
            if (targetIdx < 0) targetIdx = projects.length - 1;
            goToProject(targetIdx, 'prev');
        });

        nextBtn.addEventListener('click', () => {
            if (isTransitioning) return;
            let targetIdx = (currentIndex + 1) % projects.length;
            goToProject(targetIdx, 'next');
        });

        // Mouse Parallax & Particles in Section 4 (throttled via RAF loop)
        const s4 = document.getElementById('section-4');
        const pCanvas = document.getElementById('section-4-particles');
        const pCtx = pCanvas.getContext('2d');
        let particles = [];
        let mouse = { x: null, y: null, active: false };

        function resizeParticlesCanvas() {
            if (!pCanvas) return;
            pCanvas.width = s4.clientWidth;
            pCanvas.height = s4.clientHeight;
        }
        window.addEventListener('resize', resizeParticlesCanvas);
        resizeParticlesCanvas();

        class S4Particle {
            constructor() {
                this.reset(true);
            }

            reset(init = false) {
                this.x = Math.random() * pCanvas.width;
                this.y = init ? Math.random() * pCanvas.height : pCanvas.height + 10;
                this.vx = (Math.random() - 0.5) * 0.5;
                this.vy = -(Math.random() * 0.7 + 0.3); // drift up slowly
                this.size = Math.random() * 2 + 1;
                this.alpha = Math.random() * 0.4 + 0.15;
                this.baseAlpha = this.alpha;
                // Amber/gold hue range: 35 to 48
                const hue = 35 + Math.random() * 13;
                const sat = 90 + Math.random() * 10;
                const light = 50 + Math.random() * 18;
                this.color = `hsla(${hue}, ${sat}%, ${light}%, `;
            }

            update() {
                this.x += this.vx;
                this.y += this.vy;

                // Mouse interaction: glow brighter and sway/attract when near cursor
                if (mouse.active) {
                    const dx = mouse.x - this.x;
                    const dy = mouse.y - this.y;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    const maxDist = 220;

                    if (dist < maxDist) {
                        const intensity = (1 - dist / maxDist);
                        this.alpha = Math.min(1.0, this.baseAlpha + intensity * 0.8);
                        
                        // Gentle pull towards or push away (let's do a gentle pull/sway)
                        const force = (maxDist - dist) / maxDist;
                        this.x += (dx / dist) * force * 0.7;
                        this.y += (dy / dist) * force * 0.7;
                        this.drawSize = this.size * (1 + intensity * 0.7);
                    } else {
                        this.alpha = this.baseAlpha;
                        this.drawSize = this.size;
                    }
                } else {
                    this.alpha = this.baseAlpha;
                    this.drawSize = this.size;
                }

                // Reset when out of screen bounds
                if (this.y < -10 || this.x < -10 || this.x > pCanvas.width + 10) {
                    this.reset(false);
                }
            }

            draw() {
                pCtx.beginPath();
                pCtx.arc(this.x, this.y, this.drawSize, 0, Math.PI * 2);
                pCtx.fillStyle = this.color + this.alpha + ')';
                pCtx.fill();

                // Draw a subtle soft glow around brighter particles (disabled on mobile for performance)
                if (!isMobile && this.alpha > 0.7) {
                    pCtx.beginPath();
                    pCtx.arc(this.x, this.y, this.drawSize * 2.0, 0, Math.PI * 2);
                    pCtx.fillStyle = this.color + (this.alpha * 0.1) + ')';
                    pCtx.fill();
                }
            }
        }

        const isMobile = window.innerWidth < 768 || ('ontouchstart' in window) || (navigator.maxTouchPoints > 0);

        // Generate initial particles (reduced on mobile)
        const particleCount = isMobile ? 25 : 70;
        for (let i = 0; i < particleCount; i++) {
            particles.push(new S4Particle());
        }

        // Targets and current state for smooth interpolation
        let bookTiltTarget = { x: 54, y: 0, z: 0 };
        let bookTiltCurrent = { x: 54, y: 0, z: 0 };
        let cardTiltTarget = { x: 0, y: 0 };
        let cardTiltCurrent = { x: 0, y: 0 };
        let cardEnteringUntil = 0; // timestamp — tilt loop skips inline style writes during entry animation

        function easeLerp(a, b, t) { return a + (b - a) * t; }

        s4.addEventListener('mousemove', (e) => {
            if (isMobile) return;
            const rect = s4.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;
            
            // Update mouse tracking for particles
            mouse.x = x;
            mouse.y = y;
            mouse.active = true;

            if (isTransitioning) return;
            const xOffset = (x / rect.width) - 0.5;
            const yOffset = (y / rect.height) - 0.5;

            // update targets only (no direct DOM writes)
            bookTiltTarget.x = 54 - (yOffset * 10);
            bookTiltTarget.y = xOffset * 12;
            bookTiltTarget.z = xOffset * 3;

            cardTiltTarget.x = -yOffset * 15;
            cardTiltTarget.y = xOffset * 15;
        }, { passive: true });

        s4.addEventListener('mouseleave', () => {
            if (isMobile) return;
            mouse.active = false;
            if (isTransitioning) return;
            bookTiltTarget = { x: 54, y: 0, z: 0 };
            cardTiltTarget = { x: 0, y: 0 };
        });

        let section4Visible = false;
        const s4Observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                section4Visible = entry.isIntersecting;
            });
        }, { threshold: 0.001 });
        if (s4) s4Observer.observe(s4);

        // RAF loop to interpolate transforms and apply them once per frame
        (function tiltLoop() {
            requestAnimationFrame(tiltLoop);

            if (!section4Visible) return;

            // Update and render particles
            pCtx.clearRect(0, 0, pCanvas.width, pCanvas.height);
            for (let i = 0; i < particles.length; i++) {
                particles[i].update();
                particles[i].draw();
            }

            // Skip all DOM writes while a page flip is running, and bypass parallax transforms on mobile
            if (!isTransitioning && !isMobile) {
                // interpolate towards targets
                const t = 0.14; // smoothing factor
                bookTiltCurrent.x = easeLerp(bookTiltCurrent.x, bookTiltTarget.x, t);
                bookTiltCurrent.y = easeLerp(bookTiltCurrent.y, bookTiltTarget.y, t);
                bookTiltCurrent.z = easeLerp(bookTiltCurrent.z, bookTiltTarget.z, t);

                cardTiltCurrent.x = easeLerp(cardTiltCurrent.x, cardTiltTarget.x, t);
                cardTiltCurrent.y = easeLerp(cardTiltCurrent.y, cardTiltTarget.y, t);

                // Apply transforms (single style writes)
                book3d.style.transform = `rotateX(${bookTiltCurrent.x}deg) rotateY(${bookTiltCurrent.y}deg) rotateZ(${bookTiltCurrent.z}deg) translateY(60px)`;

                const activeCard = showcase.querySelector('.floating-project.active');
                if (activeCard && Date.now() > cardEnteringUntil) {
                    activeCard.style.transform = `translate3d(0, 0, 50px)`;
                }
            }
        })();

        // Fullscreen project image gallery modal
        function openImageLightbox(proj) {
            const imgs = Array.isArray(proj.image) ? proj.image : [proj.image];
            
            const modal = document.createElement('div');
            modal.className = 'project-image-modal';
            
            const imagesHtml = imgs.map(img => `
                <div class="modal-image-wrapper">
                    <img src="${img}" alt="${proj.title}" class="modal-image" />
                </div>
            `).join('');
            
            modal.innerHTML = `
                <div class="modal-backdrop"></div>
                <div class="modal-content-container">
                    <button class="modal-close-btn" aria-label="Close modal">&times;</button>
                    <div class="modal-header">
                        <h3>${proj.title} - Project Gallery</h3>
                    </div>
                    <div class="modal-grid">
                        ${imagesHtml}
                    </div>
                </div>
            `;
            
            document.body.appendChild(modal);
            
            // Prevent scroll on body while modal is open
            document.body.style.overflow = 'hidden';
            
            const closeModal = () => {
                modal.classList.add('closing');
                document.body.style.overflow = '';
                setTimeout(() => {
                    modal.remove();
                }, 300);
            };
            
            modal.querySelector('.modal-close-btn').addEventListener('click', closeModal);
            modal.querySelector('.modal-backdrop').addEventListener('click', closeModal);
            
            const keyHandler = (e) => {
                if (e.key === 'Escape') {
                    closeModal();
                    document.removeEventListener('keydown', keyHandler);
                }
            };
            document.addEventListener('keydown', keyHandler);
        }

        // Initialize immediately
        initShowcase();
    })();
    </script>
</body>
</html>
