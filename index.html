<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bintang Prastyo</title>
    <meta name="description" content="Bintang Prastyo — IT Enthusiast. Creative developer portfolio showcasing projects and skills.">
    <!-- <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><circle cx=%2250%22 cy=%2250%22 r=%2240%22 fill=%22%23000000%22 stroke=%22%23fcb32d%22 stroke-width=%226%22/><text x=%2250%25%22 y=%2267%25%22 font-family=%22Outfit,sans-serif%22 font-size=%2250%22 font-weight=%22800%22 fill=%22%23fcb32d%22 text-anchor=%22middle%22>B</text></svg>"> -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --ui-font-size: 15px;
            --ui-font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial;

            /* Colors */
            --color-bg: #000000;
            --color-white: #ffffff;
            --accent: #fcb32d;
            --accent-glow: rgba(252, 179, 45, 0.35);
            --ui-overlay: rgba(255, 255, 255, 0.08);
            --ui-overlay-strong: rgba(255, 255, 255, 0.15);
            --ui-overlay-medium: rgba(255, 255, 255, 0.12);
            --muted: rgba(255, 255, 255, 0.55);
            --muted-2: rgba(255, 255, 255, 0.45);
            --muted-3: rgba(255, 255, 255, 0.4);
            --ui-input-bg: rgba(255, 255, 255, 0.1);

            /* Badge palette */
            --badge-front-bg: rgba(100, 200, 255, 0.15);
            --badge-front-color: #7dd4f8;
            --badge-front-border: rgba(100, 200, 255, 0.25);

            --badge-left-bg: rgba(180, 140, 255, 0.15);
            --badge-left-color: #c4a8ff;
            --badge-left-border: rgba(180, 140, 255, 0.25);

            --badge-right-bg: rgba(255, 180, 100, 0.15);
            --badge-right-color: #ffc875;
            --badge-right-border: rgba(255, 180, 100, 0.25);

            --badge-oblique-bg: rgba(100, 255, 180, 0.15);
            --badge-oblique-color: #6effc2;
            --badge-oblique-border: rgba(100, 255, 180, 0.25);
        }

        body {
            background: var(--color-bg);
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            color: var(--color-white);
            font-family: 'Outfit', 'Space Grotesk', system-ui, sans-serif;
        }

        html {
            scroll-behavior: auto !important;
        }
        html.lenis, html.lenis body {
            height: auto;
        }
        .lenis-smooth {
            scroll-behavior: auto !important;
        }
        .lenis-smooth [data-lenis-prevent] {
            overscroll-behavior: contain;
        }
        .lenis-stopped {
            overflow: hidden;
        }

        /* Once loading is done we allow scrolling */
        body.scrollable {
            overflow-x: clip;
            overflow-y: visible;
            height: auto;
        }

        /* Section layout */
        .section {
            height: 100vh;
            width: 100vw;
            position: relative;
            overflow: hidden;
        }

        #section-1 {
            background: transparent;
            pointer-events: none;
        }

        #section-2 {
            background: var(--color-bg);
            z-index: 2;
        }

        #section-3 {
            background: var(--color-bg);
            z-index: 2;
            overflow: visible;
        }

        /* Glowing golden borders for Section 2 */
        .border-glow {
            position: absolute;
            inset: 0;
            z-index: 12;
            pointer-events: none;
            box-shadow: 
                inset 0 0 60px rgba(252, 179, 45, 0.45), 
                inset 0 0 20px rgba(252, 179, 45, 0.25);
            border: 2px solid rgba(252, 179, 45, 0.3);
            border-image: linear-gradient(to bottom, rgba(252, 179, 45, 0.6), rgba(252, 179, 45, 0.1) 50%, rgba(252, 179, 45, 0.6)) 1;
            opacity: 0;
            transition: opacity 1.2s cubic-bezier(0.16, 1, 0.3, 1);
        }

        /* Trigger border glow on reveal */
        #section-2.revealed .border-glow {
            opacity: 1;
        }

        /* Decorative 3D Elements */
        .decor-element {
            position: absolute;
            z-index: 4;
            mix-blend-mode: screen;
            pointer-events: none;
            filter: contrast(1.25) brightness(0.85); /* Erases any faint border outline from the dark image background */
        }

        .decor-capsule {
            top: -12%;
            left: -12%;
            width: clamp(200px, 30vw, 400px);
            transform: rotate(20deg);
            opacity: 0.85;
        }

        .decor-pentagon {
            top: -12%;
            right: -12%;
            width: clamp(200px, 30vw, 400px);
            transform: rotate(-15deg);
            opacity: 0.85;
        }

        .decor-left {
            top: 30%;
            left: -8%;
            width: clamp(180px, 25vw, 320px);
            opacity: 0.8;
        }

        .decor-right {
            top: 25%;
            right: -8%;
            width: clamp(180px, 25vw, 320px);
            opacity: 0.8;
        }

        canvas#mainCanvas {
            display: block;
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: -1;
            pointer-events: none;
        }

        #bubbleCanvas {
            position: fixed;
            inset: 0;
            width: 100%;
            height: 100%;
            z-index: 4;
            pointer-events: none;
        }

        /* ─── REVEAL SECTION: image + worms + text ─── */

        /* Background image layer */
        .hero-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2;
            overflow: hidden;
            pointer-events: none;
        }

        .hero-bg img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: brightness(0.4) saturate(1.15);
            transform: scale(1.12);
            transition: transform 2s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }

        .hero-bg.revealed img {
            transform: scale(1.0);
        }

        .hero-bg::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(
                to bottom,
                rgba(0, 0, 0, 0.7) 0%,
                rgba(0, 0, 0, 0.1) 35%,
                rgba(0, 0, 0, 0.1) 65%,
                rgba(0, 0, 0, 0.8) 100%
            );
            z-index: 1;
        }

        /* Worm canvas overlay — between image and text */
        #wormCanvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 3;
            pointer-events: none;
        }

        /* Overlay text layer */
        .hero-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            display: flex;
            align-items: flex-end;
            justify-content: flex-start;
            padding: 3rem;
            pointer-events: none;
        }

        /* Title */
        .hero-title {
            font-family: 'Outfit', sans-serif;
            font-weight: 800;
            font-size: clamp(2.5rem, 8vw, 6.5rem);
            letter-spacing: -0.03em;
            line-height: 0.95;
            text-transform: uppercase;
            color: #fcb32d; /* Fallback golden accent color */
            text-shadow: 0 0 35px rgba(252, 179, 45, 0.22);
            text-align: left;
            position: relative;
            z-index: 2;
        }

        .hero-title .line {
            display: block;
            overflow: hidden;
        }

        .hero-title .line span {
            display: inline-block;
            transform: translateY(115%);
            transition: transform 1s cubic-bezier(0.16, 1, 0.3, 1);
            background: linear-gradient(135deg, #ffe596 0%, #fcb32d 55%, #b67500 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .hero-title.animate .line span {
            transform: translateY(0);
        }

        .hero-title .line:nth-child(2) span {
            transition-delay: 0.14s;
        }

        /* Corner label */
        .corner-label {
            position: absolute;
            bottom: 3rem;
            right: 3rem;
            z-index: 11;
            font-family: 'Space Grotesk', sans-serif;
            font-weight: 400;
            font-size: 0.8rem;
            letter-spacing: 0.25em;
            text-transform: uppercase;
            color: var(--accent);
            opacity: 0;
            transform: translateY(20px);
            transition: opacity 0.9s ease 0.5s, transform 0.9s ease 0.5s;
            pointer-events: none;
            writing-mode: vertical-rl;
            text-orientation: mixed;
        }

        .corner-label.visible {
            opacity: 1;
            transform: translateY(0);
        }

        /* Hello bubble Speech bubble matching the theme */
        .hello-bubble {
            position: absolute;
            top: 26%;
            left: 64%;
            padding: 0.75rem 1.5rem;
            font-family: 'Space Grotesk', sans-serif;
            font-weight: 600;
            font-size: 1.05rem;
            color: #ffe596;
            background: rgba(252, 179, 45, 0.12);
            border: 1px solid rgba(252, 179, 45, 0.45);
            border-radius: 20px;
            border-bottom-left-radius: 4px;
            box-shadow: 0 8px 32px 0 rgba(252, 179, 45, 0.15);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            opacity: 0;
            transform: translateY(20px) scale(0.9);
            z-index: 12;
            pointer-events: none;
            text-shadow: 0 0 10px rgba(252, 179, 45, 0.25);
            transition: opacity 0.25s ease-out, transform 0.25s ease-out;
        }

        @media (max-width: 576px) {
            .hello-bubble {
                top: 20%;
                left: 12%;
                border-bottom-left-radius: 20px;
                border-bottom-right-radius: 4px;
            }
        }

        .social-sidebar {
            position: absolute;
            top: 50%;
            left: 2rem;
            transform: translateY(-50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.85rem;
            z-index: 13;
            pointer-events: auto;
        }

        .social-sidebar::after {
            content: '';
            display: block;
            width: 1px;
            height: 5.5rem;
            background: rgba(255, 255, 255, 0.18);
            margin-top: 0.5rem;
        }

        /* Top-center header social links (slides down from nonexistent top) */
        .social-header {
            position: fixed;
            top: 0;
            left: 50%;
            transform: translate(-50%, -100%);
            display: flex;
            flex-direction: row;
            align-items: center;
            gap: 0.85rem;
            z-index: 13;
            pointer-events: auto;
            opacity: 0;
            visibility: hidden;
            transition: transform 0.5s cubic-bezier(0.16, 1, 0.3, 1), opacity 0.4s ease, visibility 0.4s ease;
        }

        .social-header.visible {
            opacity: 1;
            visibility: visible;
            transform: translate(-50%, 2rem);
        }

        .social-header .social-link:hover,
        .social-header .social-link:focus-visible {
            transform: translateY(-4px);
            background: rgba(255, 255, 255, 0.07);
            border-color: rgba(255, 255, 255, 0.14);
        }

        .social-link {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background: rgba(252, 179, 45, 0.18);
            border: 1px solid rgba(252, 179, 45, 0.45);
            color: var(--color-white);
            transition: transform 0.25s ease, background 0.25s ease, border-color 0.25s ease;
            text-decoration: none;
            overflow: hidden;
        }

        .social-link:hover,
        .social-link:focus-visible {
            transform: translateX(4px);
            background: rgba(255, 255, 255, 0.07);
            border-color: rgba(255, 255, 255, 0.14);
        }

        .social-link svg {
            width: 20px;
            height: 20px;
            fill: currentColor;
        }

        @media (max-width: 768px) {
            .social-sidebar {
                left: 1.75rem;
            }

            .social-sidebar::after {
                height: 4rem;
            }
        }

        .corner-label.visible {
            opacity: 1;
            transform: translateY(0);
        }

        .corner-label::before {
            content: '';
            display: block;
            width: 1px;
            height: 40px;
            background: var(--accent);
            margin: 0 auto 12px auto;
            opacity: 0.5;
        }

        /* Scroll indicator */
        .scroll-indicator {
            position: absolute;
            bottom: 2.5rem;
            left: 50%;
            transform: translateX(-50%);
            z-index: 11;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            opacity: 0;
            transition: opacity 0.6s ease;
            pointer-events: none;
        }

        .scroll-indicator.show {
            opacity: 0.7;
        }

        .scroll-indicator.hidden {
            opacity: 0 !important;
        }

        .scroll-indicator span {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 0.6rem;
            letter-spacing: 0.3em;
            text-transform: uppercase;
            color: rgba(255, 255, 255, 0.45);
        }

        .scroll-indicator .mouse {
            width: 20px;
            height: 32px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 10px;
            position: relative;
        }

        .scroll-indicator .mouse::after {
            content: '';
            position: absolute;
            top: 5px;
            left: 50%;
            width: 3px;
            height: 7px;
            background: rgba(255, 255, 255, 0.5);
            border-radius: 2px;
            transform: translateX(-50%);
            animation: scrollPulse 1.6s ease-in-out infinite;
        }

        @keyframes scrollPulse {
            0%, 100% { transform: translateX(-50%) translateY(0); opacity: 1; }
            50% { transform: translateX(-50%) translateY(7px); opacity: 0.15; }
        }

        @media (max-width: 768px) {
            .hero-overlay {
                padding: 1.5rem;
            }
            .corner-label {
                bottom: 1.5rem;
                right: 1.5rem;
            }
            .decor-element {
                opacity: 0.45 !important;
            }
            .intro-container {
                padding: 1.5rem;
            }
        }

        /* ─── SECTION 4: 3D BOOK & SHOWCASE ─── */
        #section-4 {
            perspective: 2000px;
            font-family: 'Space Grotesk', 'Outfit', sans-serif;
            background: #000000;
        }

        .s4-ambient-glow {
            position: absolute;
            bottom: -20%;
            left: 50%;
            transform: translateX(-50%);
            width: 700px;
            height: 340px;
            background: radial-gradient(ellipse at center, rgba(252, 179, 45, 0.08) 0%, rgba(0,0,0,0) 70%);
            pointer-events: none;
            filter: blur(80px);
            z-index: 1;
        }

        /* Floating Project Showcase */
        .showcase-container {
            position: absolute;
            top: 12%;
            width: 100%;
            max-width: 1400px;
            height: 460px;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 40;
        }
        
        /* ─── Project Summon-from-Book Keyframes ─── */

        /* Card rises from the RIGHT page (triggered by "next") */
        @keyframes projectSummonRight {
            0%   {
                opacity: 0;
                transform: translate3d(210px, 188px, -230px) scale(0.2) rotateX(54deg) rotateZ(-16deg);
                filter: blur(14px);
            }
            8%   { opacity: 0.3; }
            40%  {
                opacity: 0.85;
                transform: translate3d(65px, 32px, 5px) scale(0.76) rotateX(13deg) rotateZ(-4deg);
                filter: blur(3px);
            }
            70%  {
                opacity: 1;
                transform: translate3d(-10px, -14px, 68px) scale(1.028) rotateX(-2.5deg) rotateZ(0.5deg);
                filter: blur(0);
            }
            85%  { transform: translate3d(4px, 5px, 44px) scale(0.986) rotateX(1.2deg) rotateZ(0deg); }
            100% { opacity: 1; transform: translate3d(0, 0, 50px) scale(1) rotateX(0deg) rotateZ(0deg); filter: blur(0); }
        }

        /* Card rises from the LEFT page (triggered by "prev") */
        @keyframes projectSummonLeft {
            0%   {
                opacity: 0;
                transform: translate3d(-210px, 188px, -230px) scale(0.2) rotateX(54deg) rotateZ(16deg);
                filter: blur(14px);
            }
            8%   { opacity: 0.3; }
            40%  {
                opacity: 0.85;
                transform: translate3d(-65px, 32px, 5px) scale(0.76) rotateX(13deg) rotateZ(4deg);
                filter: blur(3px);
            }
            70%  {
                opacity: 1;
                transform: translate3d(10px, -14px, 68px) scale(1.028) rotateX(-2.5deg) rotateZ(-0.5deg);
                filter: blur(0);
            }
            85%  { transform: translate3d(-4px, 5px, 44px) scale(0.986) rotateX(1.2deg) rotateZ(0deg); }
            100% { opacity: 1; transform: translate3d(0, 0, 50px) scale(1) rotateX(0deg) rotateZ(0deg); filter: blur(0); }
        }

        /* Card sinks back into the LEFT page (exit on "next") */
        @keyframes projectSinkLeft {
            0%   { opacity: 1; transform: translate3d(0, 0, 50px) scale(1) rotateX(0deg) rotateZ(0deg); filter: blur(0); }
            25%  { transform: translate3d(-25px, 20px, 15px) scale(0.9) rotateX(12deg) rotateZ(-3deg); }
            100% { opacity: 0; transform: translate3d(-180px, 172px, -215px) scale(0.18) rotateX(54deg) rotateZ(-12deg); filter: blur(14px); }
        }

        /* Card sinks back into the RIGHT page (exit on "prev") */
        @keyframes projectSinkRight {
            0%   { opacity: 1; transform: translate3d(0, 0, 50px) scale(1) rotateX(0deg) rotateZ(0deg); filter: blur(0); }
            25%  { transform: translate3d(25px, 20px, 15px) scale(0.9) rotateX(12deg) rotateZ(3deg); }
            100% { opacity: 0; transform: translate3d(180px, 172px, -215px) scale(0.18) rotateX(54deg) rotateZ(12deg); filter: blur(14px); }
        }

        /* Children rise from the page surface with a slight stagger */
        @keyframes childRiseUp {
            from { opacity: 0; transform: translateY(32px) rotateX(8deg); }
            to   { opacity: 1; transform: translateY(0) rotateX(0deg); }
        }

        .floating-project {
            position: absolute;
            width: 100%;
            max-width: 1200px;
            height: 100%;
            display: flex;
            align-items: center;
            gap: 3.5rem;
            border-radius: 24px;
            transform-style: preserve-3d;
            opacity: 0;
            pointer-events: none;
            will-change: transform, opacity;
        }

        /* Entry: next → summons from right page */
        .floating-project.active.from-right {
            animation: projectSummonRight 1.08s cubic-bezier(0.16, 1, 0.3, 1) both;
            opacity: 1;
            pointer-events: auto;
        }

        /* Entry: prev → summons from left page */
        .floating-project.active.from-left {
            animation: projectSummonLeft 1.08s cubic-bezier(0.16, 1, 0.3, 1) both;
            opacity: 1;
            pointer-events: auto;
        }

        /* Fallback active (no direction) */
        .floating-project.active {
            opacity: 1;
            pointer-events: auto;
        }

        /* Exit: next → old card sinks toward left page */
        .floating-project.exiting-next {
            animation: projectSinkLeft 0.62s cubic-bezier(0.4, 0, 0.8, 0.6) forwards;
            pointer-events: none;
        }

        /* Exit: prev → old card sinks toward right page */
        .floating-project.exiting-prev {
            animation: projectSinkRight 0.62s cubic-bezier(0.4, 0, 0.8, 0.6) forwards;
            pointer-events: none;
        }

        /* Children rise up with slight stagger on summon */
        .floating-project.active .project-image-box {
            animation: childRiseUp 0.78s cubic-bezier(0.16, 1, 0.3, 1) 0.14s both;
        }
        .floating-project.active .project-details-box {
            animation: childRiseUp 0.78s cubic-bezier(0.16, 1, 0.3, 1) 0.26s both;
        }

        .project-image-box {
            width: calc(44% - 2rem);
            height: 100%;
            position: relative;
            overflow: hidden;
            border-radius: 24px;
            border: 2px solid #fcb32d;
            box-shadow: 0 0 15px rgba(252, 179, 45, 0.4), inset 0 0 10px rgba(252, 179, 45, 0.2);
            transition: box-shadow 0.3s ease, border-color 0.3s ease;
            cursor: pointer;
        }

        .project-image-box:hover {
            box-shadow: 0 0 35px rgba(252, 179, 45, 0.95), inset 0 0 20px rgba(252, 179, 45, 0.55);
            border-color: #ffcc00;
        }

        .project-image-box img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.8s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        .project-image-box:hover img {
            transform: scale(1.08);
        }

        /* Split image layout styles */
        .split-image-container {
            display: flex;
            flex-direction: column;
            width: 100%;
            height: 100%;
        }

        .split-image-top, .split-image-bottom {
            height: 50%;
            width: 100%;
            overflow: hidden;
            position: relative;
        }

        .split-image-top {
            border-bottom: 1px solid rgba(252, 179, 45, 0.2);
        }

        .split-image-top img, .split-image-bottom img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.8s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        /* 3-split image layout styles */
        .split-image-container.split-three {
            display: flex;
            flex-direction: column;
            width: 100%;
            height: 100%;
        }

        .split-image-top-full {
            height: 50%;
            width: 100%;
            overflow: hidden;
            position: relative;
            border-bottom: 1px solid rgba(252, 179, 45, 0.2);
        }

        .split-image-bottom-row {
            display: flex;
            height: 50%;
            width: 100%;
        }

        .split-image-bottom-left, .split-image-bottom-right {
            width: 50%;
            height: 100%;
            overflow: hidden;
            position: relative;
        }

        .split-image-bottom-left {
            border-right: 1px solid rgba(252, 179, 45, 0.2);
        }

        .split-image-top-full img, 
        .split-image-bottom-left img, 
        .split-image-bottom-right img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.8s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        /* 4-split (2x2) image layout styles */
        .split-image-container.split-four {
            display: grid;
            grid-template-columns: 1fr 1fr;
            grid-template-rows: 1fr 1fr;
            width: 100%;
            height: 100%;
            gap: 0;
        }

        .split-four .split-quad {
            overflow: hidden;
            position: relative;
        }

        .split-four .split-quad:nth-child(1) {

        .split-four .split-quad:nth-child(2) {

        .split-four .split-quad:nth-child(3) {

        .split-four .split-quad img {

            height: 100%;
            object-fit: cover;
            transition: transform 0.8s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        .project-image-box:hover .split-image-top img,
        .project-image-box:hover .split-image-bottom img,
        .project-image-box:hover .split-image-top-full img,
        .project-image-box:hover .split-image-bottom-left img,
        .project-image-box:hover .split-image-bottom-right img,
        .project-image-box:hover .split-four .split-quad img {
            transform: scale(1.08);
        }

        .project-image-overlay {
            position: absolute;
            inset: 0;
            background: none;
        }

        .project-details-box {
            width: calc(56% - 1.5rem);
            height: 100%;
            padding: 2.5rem 2rem;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: flex-end;
            text-align: right;
            gap: 1rem;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }

        .project-tech-list {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            margin-bottom: 16px;
            flex-wrap: wrap;
        }

        .tech-tag {
            display: inline-flex;
            align-items: center;
            gap: 0.65rem;
            padding: 0.65rem 0.9rem;
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.08);

            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            transition: transform 0.2s ease, background 0.2s ease, border-color 0.2s ease;
        }

        .tech-tag:hover,
        .tech-tag:focus-visible {
            background: rgba(252, 179, 45, 0.16);
            border-color: rgba(252, 179, 45, 0.28);
            transform: translateY(-2px);
        }

        .tech-icon {
            width: 22px;
            height: 22px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .tech-icon svg,
        .tech-icon img {
            width: 100%;
            height: 100%;
            display: block;
        }

        .tech-icon img {
            object-fit: contain;

        .tech-label {
            font-size: 0.8rem;
            font-weight: 700;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: var(--color-white);
            white-space: nowrap;
        }

        .project-title {
            font-size: clamp(2.4rem, 4vw, 3.5rem);
            font-weight: 800;
            color: #ffffff;
            margin-bottom: 0.5rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            background: linear-gradient(to right, #ffffff, #fcd58b);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .project-description {
            font-size: 1.05rem;
            line-height: 1.6;

            max-width: 95%;

        .project-actions {
            display: flex;
            justify-content: flex-end;
            gap: 15px;
            width: 100%;
        }

        .see-now-btn {
            font-family: 'Space Grotesk', sans-serif;
            text-transform: uppercase;
            font-size: 12px;
            font-weight: 600;
            letter-spacing: 1.5px;
            padding: 10px 24px;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.2, 0.8, 0.2, 1);
            display: inline-flex;
            align-items: center;
            gap: 8px;
            text-decoration: none;
        }

        .see-now-btn.active {
            background: var(--accent);
            color: #000000;
            border: 1px solid var(--accent);
            box-shadow: 0 4px 15px rgba(252, 179, 45, 0.3);
        }

        .see-now-btn.active:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(252, 179, 45, 0.5), 0 0 10px rgba(252, 179, 45, 0.3);
            background: #ffffff;
            border-color: #ffffff;
        }

        .see-now-btn.disabled {
            background: rgba(255, 255, 255, 0.05);
            color: rgba(255, 255, 255, 0.25);
            border: 1px solid rgba(255, 255, 255, 0.1);
            cursor: not-allowed;
            pointer-events: none;
        }

        .see-more-btn {
            font-family: 'Space Grotesk', sans-serif;
            text-transform: uppercase;
            font-size: 12px;
            font-weight: 600;
            letter-spacing: 1.5px;
            padding: 10px 24px;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.2, 0.8, 0.2, 1);
            display: inline-flex;
            align-items: center;
            gap: 8px;
            border: 1px solid rgba(252, 179, 45, 0.24);
            background: rgba(252, 179, 45, 0.12);
            color: #ffffff;
        }

        .see-more-btn:hover,
        .see-more-btn:focus-visible {
            background: rgba(252, 179, 45, 0.22);
            transform: translateY(-1px);
        }

        .subproject-list {
            margin: 1rem 0 0;
            padding: 0;
            list-style: none;
            opacity: 1;
            max-height: none;
        }


        .subproject-list li {
            margin-bottom: 0.75rem;
        }

        .subproject-list li a {
            color: #fcd67e;
            text-decoration: none;
            font-weight: 700;
        }

        .subproject-list li a:hover,
        .subproject-list li a:focus-visible {
            text-decoration: underline;
        }

        .subproject-list li:last-child {
            margin-bottom: 0;
        }

        /* 3D BOOK PORTION */
        .book-viewport {
            position: absolute;
            bottom: 50px;
            width: 100vw;
            height: 430px;
            display: flex;
            justify-content: center;
            align-items: flex-end;
            pointer-events: none;
            z-index: 30;
            perspective: 2400px;
        }

        .book-3d {
            position: relative;
            width: 90vw;
            max-width: 1200px;
            height: 330px;
            transform-style: preserve-3d;
            transform: rotateX(42deg) rotateY(0deg) rotateZ(0deg) translateY(40px);
            transition: transform 0.8s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        /* Leather-textured covers - Bold Yellow Orange with antique/pirate style */
        .book-cover-3d {
            position: absolute;
            width: 50%;
            height: 100%;
            background: linear-gradient(135deg, #e68a00 0%, #cc7a00 40%, #b36b00 70%, #804d00 100%);
            border: 3px solid #ffaa00;
            box-shadow:
                0 12px 35px rgba(0, 0, 0, 0.9),
                inset 0 2px 3px rgba(255, 255, 255, 0.25),
                inset 0 -2px 10px rgba(0, 0, 0, 0.5);
            transform-style: preserve-3d;
        }

        .book-cover-3d.left-cover {
            left: 0;
            transform-origin: right center;
            border-radius: 16px 0 0 16px;
            transform: rotateY(-3deg);
            border-right: none;
        }

        .book-cover-3d.right-cover {
            right: 0;
            transform-origin: left center;
            border-radius: 0 16px 16px 0;
            transform: rotateY(3deg);
            border-left: none;
        }

        .cover-pattern {
            position: absolute;
            inset: 10px;
            border: 2px solid rgba(255, 215, 0, 0.45);
            border-radius: 8px;
            background:
                radial-gradient(circle at 30% 40%, rgba(255, 215, 0, 0.15) 0%, transparent 60%),
                radial-gradient(circle at 70% 60%, rgba(255, 215, 0, 0.1) 0%, transparent 60%);
            box-shadow: 
                inset 0 0 25px rgba(0, 0, 0, 0.4),
                0 0 15px rgba(255, 170, 0, 0.1);
        }

        /* Gold foil spine - updated to match bold orange-yellow cover */
        .book-spine-3d {
            position: absolute;
            left: calc(50% - 16px);
            width: 32px;
            height: 100%;
            background: linear-gradient(to right, #663d00, #b36b00, #663d00);
            border-left: 1px solid rgba(255, 170, 0, 0.4);
            border-right: 1px solid rgba(255, 170, 0, 0.4);
            transform: translateZ(-2px);
            box-shadow: inset 0 0 10px rgba(0, 0, 0, 0.7);
        }

        .book-pages-container {
            position: absolute;
            inset: 0;
            transform-style: preserve-3d;
            overflow: visible;
        }

        /* ═══ Pirate Parchment Pages (with chipped/old rustic texture) ═══ */
        .page-sheet-3d {
            position: absolute;
            width: calc(50% - 8px);
            height: calc(100% - 16px);
            top: 8px;
            background: 
                radial-gradient(circle at 20% 30%, rgba(139, 105, 20, 0.05) 0%, transparent 60%),
                radial-gradient(circle at 80% 70%, rgba(90, 69, 32, 0.08) 0%, transparent 60%),
                linear-gradient(135deg, #f2e5c4 0%, #eddcae 35%, #e3ce94 75%, #d1ba7b 100%);
            overflow: hidden;
            border: 1px solid rgba(139, 105, 20, 0.45);
            transform-style: preserve-3d;
            box-shadow:
                0 3px 12px rgba(80, 60, 20, 0.25),
                inset 0 0 50px rgba(90, 69, 32, 0.22);
            /* chipped/weathered page corner outline simulator */
            clip-path: polygon(
                0% 2%, 2% 0%, 98% 0%, 100% 2%, 
                100% 95%, 99% 96%, 98% 95%, 97% 98%, 95% 97%, 
                93% 100%, 7% 100%, 5% 98%, 3% 97%, 1% 99%, 0% 98%
            );
        }

        .page-sheet-3d.left-static {
            right: 50%;
            border-radius: 8px 0 0 8px;
            transform-origin: right center;
            transform: rotateY(-2deg) translateZ(1px);
            /* Subtle inner shadow on binding edge */
            box-shadow:
                0 3px 12px rgba(80, 60, 20, 0.25),
                inset -20px 0 25px -10px rgba(90, 69, 32, 0.35),
                inset 0 0 50px rgba(90, 69, 32, 0.22);
        }

        .page-sheet-3d.right-static {
            left: 50%;
            border-radius: 0 8px 8px 0;
            transform-origin: left center;
            transform: rotateY(2deg) translateZ(1px);
            box-shadow:
                0 3px 12px rgba(80, 60, 20, 0.25),
                inset 20px 0 25px -10px rgba(90, 69, 32, 0.35),
                inset 0 0 50px rgba(90, 69, 32, 0.22);
        }

        /* ═══ Realistic page-flip element ═══ */
        .page-sheet-3d.flipping-page {
            border-radius: 0 8px 8px 0;
            transform-origin: left center;
            z-index: 100;
            transform: rotateY(0deg);
            will-change: transform;
            box-shadow:
                0 8px 25px rgba(50, 30, 10, 0.45);
            /* Preserve 3D context so children flip correctly */
            transform-style: preserve-3d;
            background: none !important;
            border: none !important;
            box-shadow: none !important;
            clip-path: none !important;
            transition: transform 1.25s cubic-bezier(0.35, 0, 0.25, 1);
        }

        /* Dynamic shadow that moves with the flip */
        .page-flip-shadow {
            position: absolute;
            top: 0;
            right: 0;
            width: 40%;
            height: 100%;
            background: linear-gradient(to left, rgba(80, 60, 30, 0.18), transparent);
            opacity: 0;
            transition: opacity 0.8s ease;
            pointer-events: none;
            z-index: 50;
        }

        .page-sheet-3d.flipping-page.flipping .page-flip-shadow {
            opacity: 1;
        }

        /* Fold crease highlight on the binding edge */
        .page-crease {
            position: absolute;
            top: 0;
            left: 0;
            width: 12px;
            height: 100%;
            background: linear-gradient(to right,
                rgba(120, 100, 60, 0.15),
                rgba(120, 100, 60, 0.04) 50%,
                transparent 100%);
            pointer-events: none;
            z-index: 5;
        }

        /* Page Content styling — dark text on cream */
        .page-inner-content {
            position: absolute;
            inset: 20px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            color: rgba(60, 48, 30, 0.75);
            overflow: hidden;
        }

        .page-blueprint {
            position: absolute;
            inset: 20px;
            width: calc(100% - 40px);
            height: calc(100% - 40px);
            max-width: calc(100% - 40px);
            max-height: calc(100% - 40px);
            display: block;
            opacity: 0.65;
            pointer-events: none;
            stroke-dasharray: 4;
            animation: blueprintGlow 3s ease-in-out infinite alternate;
        }

        .page-blueprint * {
            stroke: #a0781b !important;
        }

        @keyframes blueprintGlow {
            0% { opacity: 0.50; }
            100% { opacity: 0.80; }
        }

        .page-header {
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #8b6914;
            border-bottom: 1px solid rgba(139, 105, 20, 0.25);
            padding-bottom: 5px;
            display: flex;
            justify-content: space-between;
        }

        .page-body-blueprint {
            flex-grow: 1;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .page-footer {
            font-size: 9px;
            letter-spacing: 1px;
            color: rgba(100, 80, 40, 0.5);
            text-align: right;
        }

        /* Page-turn edge stacking effect (visible page thickness) */
        .book-pages-container::before {
            content: '';
            position: absolute;
            left: 50%;
            top: 10px;
            width: calc(50% - 12px);
            height: calc(100% - 20px);
            border-radius: 0 6px 6px 0;
            transform: translateZ(-1px);
            box-shadow: inset 2px 0 4px rgba(100, 80, 40, 0.1);
        }

        .book-pages-container::after {
            content: '';
            position: absolute;
            right: 50%;
            top: 10px;
            width: calc(50% - 12px);
            height: calc(100% - 20px);
            border-radius: 6px 0 0 6px;
            transform: translateZ(-1px);
            box-shadow: inset -2px 0 4px rgba(100, 80, 40, 0.1);
        }

        /* NAVIGATION OVERLAY */
        .book-navigation {
            position: absolute;
            bottom: 30px;
            display: flex;
            gap: 40px;
            z-index: 40;
        }

        .nav-btn {
            width: 54px;
            height: 54px;
            border-radius: 50%;
            background: rgba(15, 15, 15, 0.75);
            border: 1px solid rgba(252, 179, 45, 0.35);
            color: var(--accent);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5),
                        0 0 10px rgba(252, 179, 45, 0.1);
            transition: all 0.3s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        .nav-btn svg {
            width: 24px;
            height: 24px;
        }

        .nav-btn:hover {
            background: var(--accent);
            color: #000000;
            border-color: var(--accent);
            box-shadow: 0 6px 20px rgba(252, 179, 45, 0.4),
                        0 0 15px rgba(252, 179, 45, 0.2);
            transform: scale(1.08);
        }

        .nav-btn:active {
            transform: scale(0.95);
        }

        /* Pagination dots */
        .project-pagination {
            position: absolute;
            bottom: 105px;
            display: flex;
            gap: 12px;
            z-index: 20;
        }

        .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.2);
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .dot.active {
            background: var(--accent);
            box-shadow: 0 0 10px var(--accent);
            width: 24px;
            border-radius: 4px;
        }

        /* Responsive styling for Section 4 */
        @media (max-width: 900px) {
            .showcase-container {
                height: auto;
                top: 8%;
            }

            .floating-project {
                flex-direction: column;
                height: 520px;
                max-width: 450px;
            }

            .project-image-box {
                width: 100%;
                height: 40%;
                border-right: none;
                border-bottom: 1px solid rgba(252, 179, 45, 0.2);
            }

            .project-image-overlay {
                background: linear-gradient(to top, rgba(10, 10, 10, 0.95) 15%, rgba(0,0,0,0));
            }

            .project-details-box {
                width: 100%;
                height: 60%;
                padding: 1.5rem;
            }

            .project-title {
                font-size: 1.5rem;
                margin-bottom: 0.5rem;
            }

            .project-description {
                font-size: 0.85rem;
                margin-bottom: 1.2rem;
            }

            .book-viewport {
                height: 270px;
            }

            .book-3d {
                width: 430px;
                height: 240px;
                transform: rotateX(48deg) rotateY(0deg) rotateZ(0deg) translateY(40px);
            }
            
            .nav-btn {
                width: 44px;
                height: 44px;
            }

            .book-pages-container::before,
            .book-pages-container::after {
                display: none;
            }
        }

        @media (max-width: 576px) {
            .floating-project {
                height: 480px;
            }
            .book-3d {
                width: 300px;
                height: 180px;
                transform: rotateX(45deg) rotateY(0deg) rotateZ(0deg) translateY(20px);
            }
            .project-pagination {
                bottom: 85px;
            }
            .book-navigation {
                bottom: 15px;
            }
        }



        /* ═══ Fullscreen Image Lightbox Modal ═══ */
        .project-image-modal {
            position: fixed;
            inset: 0;
            z-index: 9999;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.3s ease;
            pointer-events: auto;
            animation: modalFadeIn 0.3s forwards ease;
        }
        
        .project-image-modal.closing {
            animation: modalFadeOut 0.3s forwards ease;
        }

        .modal-backdrop {
            position: absolute;
            inset: 0;
            background: rgba(8, 8, 12, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }

        .modal-content-container {
            position: relative;
            width: 90vw;
            max-width: 1400px;
            max-height: 85vh;
            background: rgba(20, 20, 25, 0.9);
            border: 2px solid #fcb32d;
            border-radius: 16px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.8), 0 0 30px rgba(252, 179, 45, 0.15);
            display: flex;
            flex-direction: column;
            padding: 24px;
            z-index: 10;
            transform: scale(0.9);
            animation: modalScaleIn 0.3s forwards cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        
        .project-image-modal.closing .modal-content-container {
            animation: modalScaleOut 0.3s forwards ease;
        }

        .modal-close-btn {
            position: absolute;
            top: 16px;
            right: 16px;
            width: 36px;
            height: 36px;
            background: rgba(252, 179, 45, 0.1);
            border: 1px solid #fcb32d;
            border-radius: 50%;
            color: #fcb32d;
            font-size: 24px;
            line-height: 1;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
        }

        .modal-close-btn:hover {
            background: #fcb32d;
            color: #000;
            transform: rotate(90deg);
            box-shadow: 0 0 10px rgba(252, 179, 45, 0.5);
        }

        .modal-header {
            margin-bottom: 20px;
            border-bottom: 1px solid rgba(252, 179, 45, 0.2);
            padding-bottom: 10px;
        }

        .modal-header h3 {
            margin: 0;
            font-family: 'Space Grotesk', sans-serif;
            font-size: 1.5rem;
            color: #fcb32d;
            text-shadow: 0 0 10px rgba(252, 179, 45, 0.3);
        }

        .modal-grid {
            flex-grow: 1;
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            justify-content: center;
            align-items: center;
            overflow-y: auto;
            padding: 10px;
        }

        .modal-image-wrapper {
            position: relative;
            flex: 1 1 300px;
            max-width: 100%;
            height: auto;
            max-height: 60vh;
            border-radius: 8px;
            overflow: hidden;
            border: 1px solid rgba(252, 179, 45, 0.2);
            background: #050508;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
            transition: all 0.3s ease;
        }
        
        .modal-image-wrapper:hover {
            border-color: #fcb32d;
            transform: translateY(-4px);
            box-shadow: 0 10px 25px rgba(252, 179, 45, 0.25);
        }

        .modal-image {
            width: 100%;
            height: 100%;
            object-fit: contain;
            max-height: 60vh;
            display: block;
        }

        @keyframes modalFadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        
        @keyframes modalFadeOut {
            from { opacity: 1; }
            to { opacity: 0; }
        }

        @keyframes modalScaleIn {
            from { transform: scale(0.9); }
            to { transform: scale(1); }
        }
        
        @keyframes modalScaleOut {
            from { transform: scale(1); }
            to { transform: scale(0.9); }
        }
    </style>

        // Canvas helper to generate radial gradient textures for frosted glass edges
        function createRadialGlassTexture(centerColor, midColor, edgeColor) {
            const canvas = document.createElement('canvas');
            canvas.width = 512;
            canvas.height = 512;
            const ctx = canvas.getContext('2d');
            
            const grad = ctx.createRadialGradient(256, 256, 0, 256, 256, 256);
            grad.addColorStop(0, centerColor);
            grad.addColorStop(0.7, midColor);
            grad.addColorStop(1.0, edgeColor);
            
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, 512, 512);
            
            const tex = new THREE.CanvasTexture(canvas);
            tex.colorSpace = THREE.SRGBColorSpace || THREE.sRGBEncoding;
            return tex;
        }

        // Helper to create rounded polygon shape
        function createRoundedPolygonShape(radius, sides, cornerRadius) {
            const shape = new THREE.Shape();
            const points = [];
            for (let i = 0; i < sides; i++) {
                const angle = (i / sides) * Math.PI * 2 - Math.PI / 2;
                points.push(new THREE.Vector2(Math.cos(angle) * radius, Math.sin(angle) * radius));
            }
            for (let i = 0; i < sides; i++) {
                const p1 = points[i];
                const p2 = points[(i + 1) % sides];
                const p0 = points[(i - 1 + sides) % sides];
                const dir1 = new THREE.Vector2().subVectors(p1, p0).normalize();
                const dir2 = new THREE.Vector2().subVectors(p2, p1).normalize();
                const start = new THREE.Vector2().addScaledVector(dir1, -cornerRadius).add(p1);
                const end = new THREE.Vector2().addScaledVector(dir2, cornerRadius).add(p1);
                if (i === 0) shape.moveTo(start.x, start.y);
                else shape.lineTo(start.x, start.y);
                shape.quadraticCurveTo(p1.x, p1.y, end.x, end.y);
            }
            shape.closePath();
            return shape;
        }

        // Helper to create rounded rectangle shape
        function createRoundedRectShape(width, height, radius) {
            const shape = new THREE.Shape();
            const x = -width / 2;
            const y = -height / 2;
            shape.moveTo(x, y + radius);
            shape.lineTo(x, y + height - radius);
            shape.quadraticCurveTo(x, y + height, x + radius, y + height);
            shape.lineTo(x + width - radius, y + height);
            shape.quadraticCurveTo(x + width, y + height, x + width, y + height - radius);
            shape.lineTo(x + width, y + radius);
            shape.quadraticCurveTo(x + width, y, x + width - radius, y);
            shape.lineTo(x + radius, y);
            shape.quadraticCurveTo(x, y, x, y + radius);
            return shape;
        }

        // helper: convert screen % to world position at given distance from camera
        function screenPercentToWorld(xPerc, yPerc, distance) {
            const x = xPerc * innerWidth;
            const y = yPerc * innerHeight;
            const ndc = new THREE.Vector3((x / innerWidth) * 2 - 1, -(y / innerHeight) * 2 + 1, 0.5);
            ndc.unproject(bubbleCamera);
            const dir = ndc.sub(bubbleCamera.position).normalize();
            return bubbleCamera.position.clone().add(dir.multiplyScalar(distance));
        }

        // Helper to create capsule group (cylinder + sphere caps) for compatibility with Three.js < r139
        function createCapsuleGroup(radius, length, material) {
            const group = new THREE.Group();
            const cylHeight = Math.max(0.01, length - 2 * radius);
            const cylGeom = new THREE.CylinderGeometry(radius, radius, cylHeight, 32, 1, true);
            const cylMesh = new THREE.Mesh(cylGeom, material);
            group.add(cylMesh);
            const sphereGeom = new THREE.SphereGeometry(radius, 32, 16);
            const topSphere = new THREE.Mesh(sphereGeom, material);
            topSphere.position.y = cylHeight / 2;
            group.add(topSphere);
            const bottomSphere = new THREE.Mesh(sphereGeom, material);
            bottomSphere.position.y = -cylHeight / 2;
            group.add(bottomSphere);
            return group;
        }

        const leftGiantMaterial = new THREE.MeshPhysicalMaterial({

        // Helper to generate a partially extended tube geometry along the ribbon path points
        function getSubCurveGeom(points, progress, radius) {
            if (progress <= 0.01) {
                // Return a tiny cube if progress is basically 0 to prevent WebGL compilation warnings
                return new THREE.BoxGeometry(0.001, 0.001, 0.001);
            }
            const divisions = 40;
            const subPoints = [];
            const curve = new THREE.CatmullRomCurve3(points);
            const limit = Math.floor(divisions * progress);
            for (let i = 0; i <= limit; i++) {
                subPoints.push(curve.getPointAt(i / divisions));
            }
            if (limit < divisions) {
                subPoints.push(curve.getPointAt(progress));
            }
            const subCurve = new THREE.CatmullRomCurve3(subPoints);
            // Increased radial segments to 24 (was 8) for a round, block-free surface
            const geom = new THREE.TubeGeometry(subCurve, Math.max(2, Math.floor(64 * progress)), radius, 24, false);
            geom.computeVertexNormals(); // Ensure smooth lighting shading across the geometry normal vectors
            return geom;
        }

        // Per-frame update for bubbles
        function updateBubbles(now) {
            // Lerp current scroll progresses towards target scroll progresses for inertia ("brakes" effect) - Snappier
            bubblePhase1Progress = THREE.MathUtils.lerp(bubblePhase1Progress, targetPhase1Progress, 0.14);
            bubblePhase2Progress = THREE.MathUtils.lerp(bubblePhase2Progress, targetPhase2Progress, 0.14);
            bubbleStickyProgress = THREE.MathUtils.lerp(bubbleStickyProgress, targetStickyProgress, 0.14);

            // Restore constant transmission defaults
            clearGlassMaterial.transmission = 0.9;
            peachGlassMaterial.transmission = 0.88;
            lavenderGlassMaterial.transmission = 0.88;
            blueGlassMaterial.transmission = 0.82;
            
            if (window.innerWidth < 576) {
                leftGiantMaterial.transmission = 0.96;
                leftGiantMaterial.opacity = 0.22;
            } else {
                leftGiantMaterial.transmission = 0.35;
                leftGiantMaterial.opacity = 0.98;
            }

            // Visibility depends on whether the smoothed progress has started/finished entering
            const isVisible = bubblePhase1Progress > 0.005;
            shapesList.forEach(mesh => { mesh.visible = isVisible; });
            ribbon1.visible = isVisible;
            ribbon2.visible = isVisible;

            if (!isVisible) return;

            // Calculate ribbon extension progress (starts after 50% scroll through Phase 2 / Section 2)
            let ribbonProgress = 0;
            if (bubblePhase2Progress > 0.5) {
                ribbonProgress = (bubblePhase2Progress - 0.5) / 0.5;
            }

            // Dynamically redraw ribbon geometries to make them grow along their paths
            ribbon1.geometry.dispose();
            ribbon1.geometry = getSubCurveGeom(ribbon1Points, ribbonProgress, 0.22);
            ribbon1.rotation.y = Math.sin(now * 0.05) * 0.05;
            ribbon1.rotation.z = Math.cos(now * 0.04) * 0.05;
            
            ribbon2.geometry.dispose();
            ribbon2.geometry = getSubCurveGeom(ribbon2Points, ribbonProgress, 0.22);
            ribbon2.rotation.y = Math.cos(now * 0.06) * 0.05;

            shapesList.forEach((mesh, idx) => {
                const ud = mesh.userData;
                const t = now * 0.5 + idx * 0.5;
                
                let xPerc, yPerc, currentScale;
                if (bubblePhase2Progress === 0) {
                    // Phase 1 scroll transition (Section 1 -> Section 2)
                    xPerc = THREE.MathUtils.lerp(ud.s1Pos.xPerc, ud.s2Pos.xPerc, bubblePhase1Progress);
                    yPerc = THREE.MathUtils.lerp(ud.s1Pos.yPerc, ud.s2Pos.yPerc, bubblePhase1Progress);
                    currentScale = THREE.MathUtils.lerp(ud.s1Scale, ud.s2Scale, bubblePhase1Progress);
                } else {
                    // Phase 2 scroll transition (Section 2 -> Section 3)
                    xPerc = THREE.MathUtils.lerp(ud.s2Pos.xPerc, ud.s3Pos.xPerc, bubblePhase2Progress);
                    yPerc = THREE.MathUtils.lerp(ud.s2Pos.yPerc, ud.s3Pos.yPerc, bubblePhase2Progress);
                    currentScale = THREE.MathUtils.lerp(ud.s2Scale, 1.0, bubblePhase2Progress);
                }
                
                mesh.scale.setScalar(currentScale);

                // Position calculation with soft float drift
                const driftX = Math.sin(t * 0.8) * ud.driftAmp * 0.25;
                const driftY = Math.cos(t * 0.6) * ud.driftAmp * 0.25;
                
                const targetWorldPos = screenPercentToWorld(
                    xPerc + driftX,
                    yPerc + driftY,
                    ud.distance
                );
                
                mesh.position.lerp(targetWorldPos, 0.08);
                
                // Rotation
                mesh.rotation.y += 0.003 * (idx % 2 ? -1 : 1);
                mesh.rotation.x += 0.0015 * (idx % 3 ? 1 : -1);

                // Specific internal updates (plus sign in glass sphere)
                if (mesh === bottomRightGlassSphere) {
                    plusGroup.rotation.y = -mesh.rotation.y * 1.5;
                    plusGroup.rotation.x = -mesh.rotation.x * 1.5;
                }
            });
        }

        function easeOutCubic(t) {
            return 1 - Math.pow(1 - t, 3);
        }

        function easeInOutCubic(t) {
            return t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2;
        }

        function smoothstep(edge0, edge1, x) {
            const t = Math.max(0, Math.min(1, (x - edge0) / (edge1 - edge0)));
            return t * t * (3 - 2 * t);
        }

                const char = chars[i];

                const targetGeom = new THREE.ExtrudeGeometry(charShapes, loadingExtrudeSettings);
                targetGeom.computeBoundingBox();
                targetGeom.translate(-targetGeom.boundingBox.min.x, 0, 0);

                const baseGeom = new THREE.ExtrudeGeometry(charShapes, baselineExtrudeSettings);
                baseGeom.computeBoundingBox();
                baseGeom.translate(-baseGeom.boundingBox.min.x, 0, 0);

            const totalWidth = currentX - letterSpacing;

            for (let i = 0; i < chars.length; i++) {
                const shiftX = xPositions[i] - totalWidth / 2;
                letterGeometries[i].translate(shiftX, 0, 0);
                baselineGeometries[i].translate(shiftX, 0, 0);
