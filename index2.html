<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perspective Text 3D</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000;
            overflow: hidden;
            width: 100vw;
            height: 100vh;
        }

        canvas {
            display: block;
        }

        #controls {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 12px;
            align-items: center;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 12px;
            padding: 10px 18px;
            backdrop-filter: blur(8px);
        }

        #controls label {
            color: rgba(255, 255, 255, 0.55);
            font: 13px/1 sans-serif;
        }

        #wordInput {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 6px;
            color: #fff;
            font-size: 14px;
            padding: 6px 10px;
            outline: none;
            width: 180px;
        }

        #wordInput:focus {
            border-color: rgba(255, 255, 255, 0.5);
        }

        #updateBtn {
            background: rgba(255, 255, 255, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 6px;
            color: #fff;
            font-size: 13px;
            padding: 6px 14px;
            cursor: pointer;
        }

        #updateBtn:hover {
            background: rgba(255, 255, 255, 0.25);
        }

        #sliderRow {
            position: fixed;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 20px;
            align-items: center;
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            padding: 8px 18px;
        }

        #sliderRow label {
            color: rgba(255, 255, 255, 0.45);
            font: 12px/1 sans-serif;
            white-space: nowrap;
        }

        #sliderRow input[type=range] {
            width: 110px;
            accent-color: #fff;
        }

        #infoBox {
            position: fixed;
            top: 24px;
            right: 24px;
            background: rgba(255, 255, 255, 0.07);
            border: 1px solid rgba(255, 255, 255, 0.13);
            border-radius: 14px;
            padding: 16px 20px;
            backdrop-filter: blur(10px);
            min-width: 200px;
        }

        #infoBox .info-title {
            color: rgba(255, 255, 255, 0.35);
            font: 10px/1 sans-serif;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            margin-bottom: 14px;
        }

        .info-row {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-bottom: 10px;
        }

        .info-row:last-child {
            margin-bottom: 0;
        }

        .info-label {
            color: rgba(255, 255, 255, 0.4);
            font: 12px/1 sans-serif;
        }

        .info-value {
            color: #fff;
            font: 600 15px/1 monospace;
        }

        .info-badge {
            display: inline-block;
            margin-top: 12px;
            padding: 4px 10px;
            border-radius: 20px;
            font: 11px/1.4 sans-serif;
            letter-spacing: 0.04em;
            width: 100%;
            text-align: center;
            box-sizing: border-box;
        }

        .badge-front {
            background: rgba(100, 200, 255, 0.15);
            color: #7dd4f8;
            border: 1px solid rgba(100, 200, 255, 0.25);
        }

        .badge-left {
            background: rgba(180, 140, 255, 0.15);
            color: #c4a8ff;
            border: 1px solid rgba(180, 140, 255, 0.25);
        }

        .badge-right {
            background: rgba(255, 180, 100, 0.15);
            color: #ffc875;
            border: 1px solid rgba(255, 180, 100, 0.25);
        }

        .badge-oblique {
            background: rgba(100, 255, 180, 0.15);
            color: #6effc2;
            border: 1px solid rgba(100, 255, 180, 0.25);
        }
    </style>
</head>

<body>

    <div id="infoBox">
        <div class="info-title">Perspective Info</div>
        <div class="info-row">
            <span class="info-label">Y-axis rotation</span>
            <span class="info-value" id="infoDeg">55°</span>
        </div>
        <div class="info-row">
            <span class="info-label">Visible width</span>
            <span class="info-value" id="infoWidth">—</span>
        </div>
        <div class="info-row">
            <span class="info-label">Extrude depth</span>
            <span class="info-value" id="infoDepth">—</span>
        </div>
        <div class="info-row">
            <span class="info-label">View type</span>
            <span class="info-value" id="infoType">—</span>
        </div>
        <div id="infoBadge" class="info-badge badge-oblique">—</div>
    </div>

    <div id="sliderRow">
        <label>Angle</label>
        <input type="range" id="angleSlider" min="-80" max="80" value="-45" step="1">
        <label>Depth</label>
        <input type="range" id="depthSlider" min="1" max="60" value="24" step="1">
    </div>

    <div id="controls">
        <label for="wordInput">Text</label>
        <input id="wordInput" type="text" value="BINTANG" maxlength="24" spellcheck="false">
        <button id="updateBtn">Update</button>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://threejs.org/examples/js/loaders/FontLoader.js"></script>
    <script>
        (function () {

            const scene = new THREE.Scene();
            scene.background = new THREE.Color(0x000000);

            const renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setPixelRatio(devicePixelRatio);
            renderer.setSize(innerWidth, innerHeight);
            renderer.shadowMap.enabled = true;
            renderer.shadowMap.type = THREE.PCFSoftShadowMap;
            document.body.appendChild(renderer.domElement);

            const camera = new THREE.PerspectiveCamera(50, innerWidth / innerHeight, 0.1, 100);
            camera.position.set(0, 1.2, 8);
            camera.lookAt(0, 0, 0);
            window.camera = camera;
            window._zoom = camera.position.z;

            const ambient = new THREE.AmbientLight(0xffffff, 0.28);
            scene.add(ambient);

            const fillLight = new THREE.DirectionalLight(0xa3c8ff, 0.24);
            fillLight.position.set(-6, 4, 4);
            fillLight.castShadow = false;
            scene.add(fillLight);

            const headLight = new THREE.DirectionalLight(0xe3f1ff, 0.22);
            headLight.position.set(0, 2.5, 6);
            scene.add(headLight);

            const floorMaterial = new THREE.MeshStandardMaterial({ color: 0x000000, roughness: 0.85, metalness: 0.05 });
            const floorGeometry = new THREE.PlaneGeometry(18, 18);
            const floorMesh = new THREE.Mesh(floorGeometry, floorMaterial);
            floorMesh.rotation.x = -Math.PI / 2;
            floorMesh.position.set(0, -1.1, 1.5);
            floorMesh.receiveShadow = true;
            scene.add(floorMesh);

            let currentGroup = new THREE.Group();
            scene.add(currentGroup);
            window.currentGroup = currentGroup;

            let font = null;
            const fontLoader = new THREE.FontLoader();
            fontLoader.load('https://threejs.org/examples/fonts/helvetiker_regular.typeface.json', loadedFont => {
                font = loadedFont;
                window._font = font;
                buildMesh(word, angleDeg, depthVal);
                updateInfo(angleDeg, depthVal);
            });

            function createWallWithTextHole(word, size, thickness) {
                const rawShapes = font.generateShapes(word, size, 10);

                const textGeometry = new THREE.ShapeGeometry(rawShapes);
                const textBounds = new THREE.Box3().setFromObject(new THREE.Mesh(textGeometry));
                const textWidth = textBounds.max.x - textBounds.min.x;
                const textHeight = textBounds.max.y - textBounds.min.y;
                const textCenterX = (textBounds.min.x + textBounds.max.x) / 2;

                const margin = 20;
                const wallWidth = Math.max(textWidth + margin, 6);
                const wallHeight = Math.max(textHeight + margin, 3.5);
                const bottomPadding = 0.35;

                const minX = textCenterX - wallWidth / 2;
                const maxX = textCenterX + wallWidth / 2;
                const minY = textBounds.min.y - bottomPadding;
                const maxY = minY + wallHeight;

                // 1. Front Wall Shape (with cutout holes)
                const wallShape = new THREE.Shape();
                wallShape.moveTo(minX, minY);
                wallShape.lineTo(maxX, minY);
                wallShape.lineTo(maxX, maxY);
                wallShape.lineTo(minX, maxY);
                wallShape.lineTo(minX, minY);
                wallShape.holes.push(...rawShapes);

                // 2. Back Wall Shape (solid, no holes!)
                const backShape = new THREE.Shape();
                backShape.moveTo(minX, minY);
                backShape.lineTo(maxX, minY);
                backShape.lineTo(maxX, maxY);
                backShape.lineTo(minX, maxY);
                backShape.lineTo(minX, minY);

                const halfThickness = thickness / 2;

                const frontExtrudeSettings = {
                    depth: halfThickness,
                    bevelEnabled: false,
                    curveSegments: 12,
                    steps: 1,
                };

                const backExtrudeSettings = {
                    depth: halfThickness,
                    bevelEnabled: false,
                    curveSegments: 12,
                    steps: 1,
                };

                const frontGeometry = new THREE.ExtrudeGeometry(wallShape, frontExtrudeSettings);
                frontGeometry.computeBoundingBox();
                const frontCenterX = (frontGeometry.boundingBox.min.x + frontGeometry.boundingBox.max.x) / 2;
                const frontBottomY = frontGeometry.boundingBox.min.y;
                frontGeometry.translate(-frontCenterX, -frontBottomY, 0);

                const backGeometry = new THREE.ExtrudeGeometry(backShape, backExtrudeSettings);
                backGeometry.computeBoundingBox();
                const backCenterX = (backGeometry.boundingBox.min.x + backGeometry.boundingBox.max.x) / 2;
                const backBottomY = backGeometry.boundingBox.min.y;
                backGeometry.translate(-backCenterX, -backBottomY, -halfThickness);

                const textCenterY = (textBounds.min.y + textBounds.max.y) / 2;
                const textTargetY = textCenterY - minY;

                return { frontGeometry, backGeometry, wallHeight, textTargetY, textWidth, bottomPadding };
            }

            function buildMesh(word, angleDeg, depthVal) {
                while (currentGroup.children.length) {
                    const child = currentGroup.children[0];
                    if (child.geometry) child.geometry.dispose();
                    if (child.material) {
                        [].concat(child.material).forEach(mat => { mat.map && mat.map.dispose(); mat.dispose(); });
                    }
                    currentGroup.remove(child);
                }

                if (!font) return;

                const wallDepth = Math.max(depthVal * 0.03, 0.4);
                const textSize = 1.8;
                const { frontGeometry, backGeometry, wallHeight, textTargetY, textWidth, bottomPadding } = createWallWithTextHole(word || 'BINTANG', textSize, wallDepth);
                
                const wallMaterial = new THREE.MeshStandardMaterial({
                    color: 0x000000,
                    roughness: 0.58,
                    metalness: 0.06,
                    side: THREE.DoubleSide,
                });

                const backMaterial = new THREE.MeshBasicMaterial({
                    color: 0xffffff,
                    side: THREE.FrontSide,
                });

                const frontMesh = new THREE.Mesh(frontGeometry, wallMaterial);
                frontMesh.castShadow = true;
                frontMesh.receiveShadow = true;

                const backMesh = new THREE.Mesh(backGeometry, backMaterial);

                // Position the wall so the bottom of the text cutout touches the floor.
                // This buries the bottom padding of the wall below the floor.
                const meshY = floorMesh.position.y - bottomPadding;
                frontMesh.position.set(0, meshY, 0);
                
                // Add a tiny offset of -0.002 in Z to prevent z-fighting between
                // the back face of the front mesh and the front face of the back mesh.
                backMesh.position.set(0, meshY, -0.002);

                currentGroup.add(frontMesh);
                currentGroup.add(backMesh);

                // Create a shadow-casting spotlight behind the wall
                // to project the shape of the text cutout onto the floor.
                const projectionDistance = Math.max(textWidth * 0.9 + 2.0, 4.0);
                const projectionLight = new THREE.SpotLight(0xffffff, 100.0, 25, Math.PI / 3, 0.4, 1.0);
                
                // Align light Y with the actual text center height in the group space
                const lightY = meshY + textTargetY;
                projectionLight.position.set(0, lightY, -projectionDistance);
                projectionLight.castShadow = true;

                // Setup high-quality shadows for sharp letter projections
                projectionLight.shadow.mapSize.width = 2048;
                projectionLight.shadow.mapSize.height = 2048;
                projectionLight.shadow.camera.near = 1.0;
                projectionLight.shadow.camera.far = 30;
                projectionLight.shadow.bias = -0.0005;

                // Position the spotlight target in front of the wall
                const lightTarget = new THREE.Object3D();
                lightTarget.position.set(0, lightY, 10.0);
                currentGroup.add(lightTarget);
                projectionLight.target = lightTarget;

                currentGroup.add(projectionLight);

                currentGroup.rotation.y = THREE.MathUtils.degToRad(angleDeg);
            }

            let word = 'BINTANG';
            let angleDeg = -45;
            let depthVal = 24;

            function updateInfo(deg, dval) {
                const abs = Math.abs(deg);
                const visW = Math.round(Math.cos(THREE.MathUtils.degToRad(abs)) * 100);
                document.getElementById('infoDeg').textContent = deg + '°';
                document.getElementById('infoWidth').textContent = visW + '%';
                document.getElementById('infoDepth').textContent = (dval * 0.03).toFixed(2) + ' u';

                let type, badgeText, badgeClass;
                if (abs <= 5) {
                    type = 'Front-on';
                    badgeText = 'Facing viewer directly';
                    badgeClass = 'badge-front';
                } else if (abs <= 30) {
                    type = 'Slight angle';
                    badgeText = deg < 0 ? 'Mild left-side view' : 'Mild right-side view';
                    badgeClass = 'badge-oblique';
                } else if (abs <= 60) {
                    type = 'Oblique';
                    badgeText = deg < 0 ? 'Left-side wall view' : 'Right-side wall view';
                    badgeClass = 'badge-oblique';
                } else if (abs <= 80) {
                    type = 'Steep angle';
                    badgeText = deg < 0 ? 'Sharp left perspective' : 'Sharp right perspective';
                    badgeClass = deg < 0 ? 'badge-left' : 'badge-right';
                } else {
                    type = 'Edge-on';
                    badgeText = 'Nearly invisible';
                    badgeClass = 'badge-front';
                }

                document.getElementById('infoType').textContent = type;
                const badge = document.getElementById('infoBadge');
                badge.textContent = badgeText;
                badge.className = 'info-badge ' + badgeClass;
            }

            buildMesh(word, angleDeg, depthVal);
            updateInfo(angleDeg, depthVal);

            document.getElementById('angleSlider').value = angleDeg;
            document.getElementById('depthSlider').value = depthVal;

             document.getElementById('angleSlider').addEventListener('input', e => {
                angleDeg = parseInt(e.target.value, 10);
                currentGroup.rotation.y = THREE.MathUtils.degToRad(angleDeg);
                updateInfo(angleDeg, depthVal);
            });

            document.getElementById('depthSlider').addEventListener('input', e => {
                depthVal = parseInt(e.target.value, 10);
                buildMesh(word, angleDeg, depthVal);
                updateInfo(angleDeg, depthVal);
            });

            document.getElementById('updateBtn').addEventListener('click', () => {
                const v = document.getElementById('wordInput').value.trim();
                if (v) {
                    word = v;
                    buildMesh(word, angleDeg, depthVal);
                    updateInfo(angleDeg, depthVal);
                }
            });

            document.getElementById('wordInput').addEventListener('keydown', e => {
                if (e.key === 'Enter') document.getElementById('updateBtn').click();
            });

            window.addEventListener('resize', () => {
                camera.aspect = innerWidth / innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(innerWidth, innerHeight);
            });

            // Wheel to zoom in/out (adjust camera Z)
            const minZoom = 3;
            const maxZoom = 20;
            window.addEventListener('wheel', (e) => {
                e.preventDefault();
                const delta = e.deltaY * 0.02; // scale scroll sensitivity
                camera.position.z = THREE.MathUtils.clamp(camera.position.z + delta, minZoom, maxZoom);
                window._zoom = camera.position.z;
            }, { passive: false });

            (function animate() {
                requestAnimationFrame(animate);
                renderer.render(scene, camera);
            })();

        })();
    </script>
</body>

</html>
